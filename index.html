<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokkipooll - Final System</title>
<style>
  body {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: #ffffff; background-image: radial-gradient(#e5e5e5 1px, transparent 1px);
    background-size: 20px 20px; overflow: hidden; user-select: none; cursor: crosshair;
    font-family: 'Pretendard', sans-serif;
  }
  .coord-tracker { position: fixed; top: 20px; right: 25px; font-size: 11px; font-weight: 700; z-index: 100; color: #333; }
  .control-panel { 
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
    display: flex; align-items: center; gap: 20px; z-index: 1000; 
    background: rgba(255, 255, 255, 0.95); padding: 12px 30px; border-radius: 40px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee;
  }
  .tol-value { font-size: 14px; font-weight: 800; color: #3b48ff; width: 50px; text-align: center; }
  
  .drag-box { position: absolute; background-color: rgba(255, 255, 255, 0.2); border: 0.5px solid rgba(59, 72, 255, 0.3); box-sizing: border-box; }
  .drag-box.active-result { border: 1px solid #333; background-color: #fff; z-index: 10; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
  .dim-label { position: absolute; top: -18px; left: 0; font-size: 9px; font-weight: 700; color: #3b48ff; }

  .content-wrapper { width: 100%; height: 100%; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 8px; padding: 10px; box-sizing: border-box; overflow: hidden; }
  .item-card { display: flex; flex-direction: column; align-items: center; max-width: 90%; max-height: 90%; cursor: pointer; }
  .item-card img { max-width: 100%; max-height: 80%; object-fit: contain; }
  .item-name { font-size: 9px; font-weight: 800; margin-top: 5px; text-transform: lowercase; }

  .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; z-index: 2000; display: none; align-items: center; justify-content: center; }
  .modal.active { display: flex; }
</style>
</head>
<body>

<div id="coordTracker" class="coord-tracker">000 / 000</div>
<div class="control-panel">
  <label style="font-size:10px; font-weight:800; color:#aaa; text-transform: uppercase;">Tolerance</label>
  <input type="range" id="toleranceSlider" min="1.0" max="3.0" step="0.01" value="1.5">
  <span id="tolValue" class="tol-value">50%</span>
</div>

<div id="detailModal" class="modal">
  <div style="text-align:center; padding:40px;">
    <img id="modalImg" src="" style="max-width:300px; margin-bottom:20px;">
    <h1 id="modalTitle"></h1>
    <p id="modalPoint" style="max-width:400px; font-size:14px; line-height:1.6; color:#666;"></p>
    <button onclick="document.getElementById('detailModal').classList.remove('active')" style="cursor:pointer; padding:10px 20px; border:1px solid #333; background:none; font-weight:800;">CLOSE</button>
  </div>
</div>

<script>
  const sheetId = '1--r68ndYvKgPbaBpPE6ovJHm5ekD9S2It0EGw3wk2Us';
  const gid = '59083326'; 
  const baseFolder = 'foldingpapers/assets/'; 
  let database = [];

  // 데이터 로딩 및 '6:4' 텍스트를 숫자로 완벽 변환
  async function init() {
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const rows = text.split('\n').slice(1);
      
      database = rows.map(row => {
        const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
        if (cols.length >= 5) {
          const rawRatio = cols[4]; 
          let calculatedVal = 1;

          if (rawRatio.includes(':')) {
            const parts = rawRatio.split(':');
            calculatedVal = parseFloat(parts[0]) / parseFloat(parts[1]);
          } else {
            calculatedVal = parseFloat(rawRatio) || 1;
          }

          // 가로세로 무관하게 큰값/작은값으로 비율 정규화
          const normRatio = calculatedVal >= 1 ? calculatedVal : 1 / calculatedVal;

          return { name: cols[0], image: cols[2], ratio: normRatio, point: cols[8] || "" };
        }
        return null;
      }).filter(d => d !== null);
    } catch (e) { console.error(e); }
  }

  init();

  const slider = document.getElementById('toleranceSlider');
  const tolText = document.getElementById('tolValue');
  slider.oninput = (e) => {
    let val = Math.round((parseFloat(e.target.value) - 1) * 50); // 수치 시각화 조정
    tolText.textContent = val + "%";
  };

  let isDragging = false;
  let startX, startY, currentBox, label;

  document.onmousedown = (e) => {
    if (e.target.closest('.control-panel') || e.target.closest('.modal')) return;
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    currentBox = document.createElement('div');
    currentBox.className = 'drag-box';
    label = document.createElement('div');
    label.className = 'dim-label';
    currentBox.appendChild(label);
    currentBox.style.left = startX + 'px'; currentBox.style.top = startY + 'px';
    document.body.appendChild(currentBox);
  };

  document.onmousemove = (e) => {
    document.getElementById('coordTracker').textContent = `${e.clientX} / ${e.clientY}`;
    if (!isDragging) return;
    let w = Math.abs(e.clientX - startX);
    let h = Math.abs(e.clientY - startY);
    currentBox.style.width = w + 'px'; currentBox.style.height = h + 'px';
    currentBox.style.left = Math.min(e.clientX, startX) + 'px';
    currentBox.style.top = Math.min(e.clientY, startY) + 'px';
    if (w > 0 && h > 0) label.textContent = `1:${(Math.max(w, h) / Math.min(w, h)).toFixed(2)}`;
  };

  document.onmouseup = () => {
    if (!isDragging) return;
    isDragging = false;
    const w = parseInt(currentBox.style.width);
    const h = parseInt(currentBox.style.height);

    if (w > 20 && h > 20) {
      const userRatio = Math.max(w, h) / Math.min(w, h);
      const tol = parseFloat(slider.value);

      // 🌟 오차범위 계산: (사용자비율/도안비율) 또는 (도안비율/사용자비율)이 Tolerance 이내인가?
      const matched = database.filter(item => {
        const diff = Math.max(userRatio / item.ratio, item.ratio / userRatio);
        return diff <= tol; 
      }).sort((a, b) => {
        const diffA = Math.max(userRatio / a.ratio, a.ratio / userRatio);
        const diffB = Math.max(userRatio / b.ratio, b.ratio / userRatio);
        return diffA - diffB;
      });

      if (matched.length > 0) {
        currentBox.classList.add('active-result');
        const best = matched[0]; // 가장 정확한 결과 1개 소환
        currentBox.innerHTML = `
          <div class="content-wrapper">
            <div class="item-card" onclick="showPop('${best.name}')">
              <img src="${baseFolder}${best.image}" alt="${best.name}">
              <div class="item-name">${best.name}</div>
            </div>
          </div>
        `;
      } else { currentBox.remove(); }
    } else { currentBox.remove(); }
  };

  function showPop(name) {
    const item = database.find(d => d.name === name);
    if (!item) return;
    document.getElementById('modalImg').src = baseFolder + item.image;
    document.getElementById('modalTitle').textContent = item.name;
    document.getElementById('modalPoint').textContent = item.point;
    document.getElementById('detailModal').classList.add('active');
  }
</script>
</body>
</html>
