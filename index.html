<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokkipooll - Accurate Ratio Sync</title>
<style>
  body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #ffffff; overflow: hidden; user-select: none; cursor: crosshair; }
  .drag-box { position: absolute; background-color: rgba(59, 72, 255, 0.02); border: 1px solid rgba(59, 72, 255, 0.15); overflow: hidden; pointer-events: none; display: flex; align-items: center; box-sizing: border-box; }
  .drag-content { display: flex; align-items: center; gap: 10px; padding: 5px; width: max-content; height: 100%; box-sizing: border-box; }
  .drag-content img { height: 90%; width: auto; object-fit: contain; display: block; }
  #status-bar { position: fixed; bottom: 15px; left: 15px; font-family: monospace; font-size: 10px; color: #3b48ff; z-index: 100; }
</style>
</head>
<body>

  <div id="status-bar">Calculating Ratios...</div>

<script>
  let isDragging = false;
  let startX, startY;
  let currentBox = null;
  let imageData = []; // { name: 'puppy.png', ratio: 0.6 } 형태

  const sheetId = '1--r68ndYvKgPbaBpPE6ovJHm5ekD9S2It0EGw3wk2Us';
  const gid = '59083326'; 
  const baseFolder = 'foldingpapers/assets/'; 

  async function loadData() {
    const status = document.getElementById('status-bar');
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;

    try {
      const response = await fetch(url);
      const csvText = await response.text();
      const rows = csvText.split('\n');
      
      let tempItems = [];
      let totalRatioSum = 0;

      for (let i = 1; i < rows.length; i++) {
        const cols = rows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
        if (cols.length >= 5) {
          const imgFile = cols[2]; // C열
          const ratioVal = cols[4]; // E열 (예: 6:4)

          let ratioNum = 0;
          const numMatch = ratioVal.match(/^(\d+(\.\d+)?)/);
          if (numMatch) {
            ratioNum = parseFloat(numMatch[1]);
            totalRatioSum += ratioNum;
            tempItems.push({ name: imgFile, weight: ratioNum });
          }
        }
      }

      // 각 항목의 절대적 비중 계산 (0~1 사이)
      imageData = tempItems.map(item => ({
        name: item.name,
        percent: item.weight / totalRatioSum
      }));

      status.innerText = `DATABASE READY: ${imageData.length} categories loaded.`;
    } catch (err) {
      status.innerText = "Error: " + err.message;
    }
  }

  loadData();

  document.addEventListener('mousedown', (e) => {
    if (imageData.length === 0) return;
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    currentBox = document.createElement('div');
    currentBox.className = 'drag-box';
    const contentWrapper = document.createElement('div');
    contentWrapper.className = 'drag-content';
    currentBox.appendChild(contentWrapper);
    document.body.appendChild(currentBox);
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging || !currentBox) return;

    const currentX = e.clientX;
    const width = Math.abs(currentX - startX);
    const height = Math.abs(e.clientY - startY);
    
    currentBox.style.width = width + 'px';
    currentBox.style.height = height + 'px';
    currentBox.style.left = Math.min(currentX, startX) + 'px';
    currentBox.style.top = Math.min(e.clientY, startY) + 'px';

    // 핵심: 드래그 길이에 따라 생성할 총 이미지 개수 결정 (예: 80px당 1개)
    const totalCount = Math.floor(width / 80);
    updateImages(currentBox.querySelector('.drag-content'), totalCount);
  });

  // 비율에 근사치하게 이미지를 채우는 함수
  function updateImages(container, count) {
    if (count <= 0) {
      container.innerHTML = '';
      return;
    }

    // 현재 이미 생성된 개수와 목표 개수가 같으면 업데이트 안 함 (성능 최적화)
    if (container.children.length === count) return;

    container.innerHTML = '';
    
    // 각 항목별로 생성해야 할 개수 계산 (반올림하여 비율 근사치 맞춤)
    let generatedCount = 0;
    imageData.forEach((item, index) => {
      let itemCount = Math.round(item.percent * count);
      
      // 마지막 항목에서 오차 보정
      if (index === imageData.length - 1) {
        itemCount = count - generatedCount;
      }

      for (let i = 0; i < itemCount; i++) {
        if (generatedCount >= count) break;
        const imgTag = document.createElement('img');
        imgTag.src = baseFolder + item.name;
        imgTag.onerror = function() { this.style.display = 'none'; };
        container.appendChild(imgTag);
        generatedCount++;
      }
    });
  }

  document.addEventListener('mouseup', () => { isDragging = false; currentBox = null; });
</script>
</body>
</html>
