<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Archive - Multi-Language</title>
<style>
    /* --- 기초 디자인: 미니멀 & 직각 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    body { background: #fdfdfd; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 가이드 */
    #dragBox { position:absolute; border:1px solid #00ff00; background: rgba(0, 255, 0, 0.02); display:none; pointer-events:none; z-index:1000; }
    #ratioTag { position:absolute; top:-22px; left:0; background:#00ff00; color:#000; font-size:10px; font-weight:bold; padding:2px 6px; }

    /* 결과 박스 */
    .traceBox { position:absolute; border:1px solid #000; background: #fff; z-index: 50; display: flex; flex-direction: column; }
    .box-header { height: 18px; border-bottom: 1px solid #000; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 8px; background: #fafafa; }
    .image-list { flex: 1; display: flex; overflow-x: auto; padding: 10px; gap: 15px; align-items: center; }
    .image-list::-webkit-scrollbar { height: 2px; }
    .image-list::-webkit-scrollbar-thumb { background: #00ff00; }
    .item-wrapper { height: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .result-img { height: calc(100% - 15px); width: auto; object-fit: contain; border: 0.5px solid #eee; }
    .item-name { font-size: 8px; margin-top: 5px; color: #888; text-transform: uppercase; }

    /* 상세 화면 */
    #detailView { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
    #detailBgImg { position: absolute; max-width: 60vw; max-height: 60vh; opacity: 0.15; z-index: -1; filter: grayscale(1); object-fit: contain; }
    #detailName { font-size: 28px; font-weight: normal; margin-bottom: 30px; text-decoration: underline; letter-spacing: 2px; }
    #detailPointBox { border: 1px solid #000; padding: 40px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; line-height: 1.8; background: rgba(255, 255, 255, 0.8); transition: all 0.5s ease; overflow: hidden; }
    #detailMeta { margin-top: 30px; font-size: 11px; color: #000; letter-spacing: 3px; text-transform: uppercase; }

    /* 조작 패널 & 언어 버튼 */
    #panel { position:fixed; left:30px; bottom:30px; width:220px; background:#fff; padding:25px; border:1px solid #000; z-index:2000; }
    #panel h1 { font-size:14px; margin-bottom:15px; letter-spacing: 1px; }
    
    .lang-switcher { position: absolute; top: 25px; right: 25px; font-size: 10px; cursor: pointer; border-bottom: 1px solid #000; }
    .lang-switcher:hover { color: #00ff00; border-color: #00ff00; }

    #status { font-size:9px; color: #888; margin-bottom: 10px; }
    #tol { width:100%; margin:15px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#00ff00; border:1px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">1:1.00</div></div>
</div>

<div id="detailView">
    <div id="detailName"></div>
    <img id="detailBgImg" src="">
    <div id="detailPointBox"></div>
    <div id="detailMeta">
        <span id="detailTime"></span> • <span id="detailLevel"></span>
    </div>
</div>

<div id="panel">
    <div class="lang-switcher" onclick="toggleLang()">EN / KR</div>
    <h1 id="ui-title">Archive.sys</h1>
    <div id="status">CONNECTING...</div>
    <label style="font-size: 10px;"><span id="ui-tol">TOLERANCE</span>: <span id="tolText">30%</span></label>
    <input type="range" min="1" max="100" value="30" id="tol">
</div>

<script>
/* --- 다국어 설정 객체 --- */
let currentLang = 'KR'; // 기본값
const translations = {
    KR: { title: "기록.sys", tol: "오차 범위", status: "연결 중...", match: "일치", ratio: "비율", scroll: "스크롤하여 탐색", indexed: "개 항목 연결됨" },
    EN: { title: "Archive.sys", tol: "TOLERANCE", status: "CONNECTING...", match: "MATCH", ratio: "RATIO", scroll: "SCROLL TO BROWSE", indexed: "ITEMS INDEXED" }
};

const SHEET_URL = "https://opensheet.elk.sh/1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60/Sheet1";
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

async function init() {
    try {
        const response = await fetch(SHEET_URL);
        const data = await response.json();
        db = data.map(item => {
            let rVal = parseFloat(item.ratio);
            return {
                name_kr: item.name, // 시트의 기본 이름을 한국어로 간주
                name_en: item.name_en || item.name, // 시트에 name_en 열이 있으면 사용
                image: item.image?.trim(),
                point_kr: item.point,
                point_en: item.point_en || item.point,
                level: item.level, 
                time: item.time,
                ratio: rVal,
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal
            };
        }).filter(item => !isNaN(item.normRatio) && item.image);
        updateUI();
    } catch (e) { document.getElementById("status").innerHTML = `ERROR`; }
}
init();

// 언어 전환 함수
function toggleLang() {
    currentLang = (currentLang === 'KR') ? 'EN' : 'KR';
    updateUI();
}

// UI 언어 업데이트
function updateUI() {
    const t = translations[currentLang];
    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-tol").innerText = t.tol;
    document.getElementById("status").innerHTML = `${db.length} ${t.indexed}`;
}

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

document.getElementById("tol").addEventListener("input", (e) => { 
    document.getElementById("tolText").innerText = e.target.value + "%"; 
});

stage.addEventListener("mousedown", (e) => {
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});
stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    const t = translations[currentLang];
    document.getElementById("ratioTag").innerHTML = `R: 1:${currentR.toFixed(2)}`;
});
stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 25 || h < 25) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));

    if (results.length > 0) {
        const t = translations[currentLang];
        let itemsHTML = results.map(item => `
            <div class="item-wrapper" onclick="event.stopPropagation(); showDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                <img src="${ASSET_PATH + item.image}" class="result-img">
                <span class="item-name">${currentLang === 'KR' ? item.name_kr : item.name_en}</span>
            </div>
        `).join('');

        box.innerHTML = `
            <div class="box-header"><span>${t.ratio}: 1:${userRatio.toFixed(1)}</span><span>${t.match}: ${results.length}</span></div>
            <div class="image-list">${itemsHTML}</div>
        `;
    }
}

function showDetail(encoded) {
    const item = JSON.parse(decodeURIComponent(atob(encoded)));
    const view = document.getElementById("detailView");
    
    const name = currentLang === 'KR' ? item.name_kr : item.name_en;
    const point = currentLang === 'KR' ? item.point_kr : item.point_en;

    document.getElementById("detailName").innerText = name;
    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;
    document.getElementById("detailPointBox").innerText = point || "...";

    // 비율 박스 조정
    const baseSize = 400;
    const r = item.ratio || 1;
    if (r >= 1) {
        document.getElementById("detailPointBox").style.width = baseSize + "px";
        document.getElementById("detailPointBox").style.height = (baseSize / r) + "px";
    } else {
        document.getElementById("detailPointBox").style.height = baseSize + "px";
        document.getElementById("detailPointBox").style.width = (baseSize * r) + "px";
    }

    const timeVal = item.time ? item.time.replace(/[^0-9]/g, "") : "0";
    document.getElementById("detailTime").innerText = `${timeVal}MIN`;
    document.getElementById("detailLevel").innerText = `LEV.${item.level || 1}`;

    view.style.display = "flex";
}

document.getElementById("detailView").onclick = function() { this.style.display = "none"; };
window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
