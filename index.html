<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORIGAMI ARCHIVE</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
    /* --- 기초 디자인 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    
    body { 
        background: #ffffff; 
        background-image: linear-gradient(#ececec 1px, transparent 1px), linear-gradient(90deg, #ececec 1px, transparent 1px);
        background-size: 20px 20px;
        font-family: 'Savate', 'Savate', sans-serif; 
        overflow: hidden; 
        color: #000;
        -webkit-font-smoothing: antialiased;
        touch-action: none;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; background: transparent; z-index: 10; }

    #guide-left {
        position: fixed; top: 25px; left: 30px;
        font-family: 'Savate', serif;
        font-size: 15px; font-weight: 600; color: hsl(231, 71%, 52%);
        letter-spacing: 0.15em; text-transform: uppercase;
        pointer-events: none; z-index: 100;
        animation: blink 2s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    #coords {
        position: fixed; top: 25px; right: 30px;
        font-family: 'Savate', monospace;
        font-size: 14px; color: #000000;
        pointer-events: none; z-index: 100;
        letter-spacing: 0.1em;
    }

    /* 드래그 가이드 */
    #dragBox { position:absolute; border:1px solid #d5d5d5; background: rgba(0, 255, 0, 0.03); display:none; pointer-events:none; z-index:1000; }
    #ratioTag { position:absolute; top:-25px; left:0; background:#000000; color:#fff; font-size:10px; font-weight:600; padding:2px 6px; white-space: nowrap; }

    /* 결과 박스 */
    .resultContainer { 
        position:absolute; 
        z-index: 50; 
        mix-blend-mode: multiply; 
        filter: contrast(1.1) brightness(1.05) saturate(1.2);
        border: 0.8px solid #0f0f0f;
    }
    .scattered-img {
        position: absolute;
        object-fit: contain; 
        cursor: grab;
        z-index: 51;
        filter: grayscale(0.2) contrast(1.1);
    }

    /* 상세 화면 */
    #detailView { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: none; z-index: 6000; flex-direction: column; align-items: center; justify-content: center; }
    #detailBgImg { position: absolute; max-width: 50vw; max-height: 50vh; opacity: 0.08; z-index: 1; filter: grayscale(1); object-fit: contain; pointer-events: none; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    #detailName { font-size: 32px; font-weight: 500; margin-bottom: 20px; text-decoration: none; letter-spacing: -0.02em; cursor: pointer; transition: color 0.2s; z-index: 10; color: #000; text-transform: lowercase; }
    #detailName:hover { color: #0000ff; }
    #detailPointBox { border: 1px solid #000; padding: 25px; display: flex; align-items: center; justify-content: center; text-align: center; font-size: 14px; line-height: 1.6; background: rgba(17, 0, 255, 0.05); transition: width 0.4s ease, height 0.4s ease; overflow-y: auto; z-index: 5; font-weight: 300; max-width: 90vw; max-height: 40vh; letter-spacing: 0.05em; word-break: keep-all; backdrop-filter: blur(2px); }
    #detailMeta { margin-top: 20px; font-size: 12px; color: #535353; letter-spacing: 2px; font-weight: 500; z-index: 10; }
    #closeDetail { position: absolute; top: 25px; right: 25px; font-size: 12px; cursor: pointer; border-bottom: 1.2px solid #000; font-weight: 600; z-index: 100; }
    #detailLangToggle { position: absolute; bottom: 25px; right: 30px; font-size: 11px; font-weight: 600; cursor: pointer; border-bottom: 1.2px solid #000; z-index: 100; }

    /* 🔴 새로 추가된 PDF 버튼 스타일 */
    #pdfBtn {
        margin-top: 25px;
        padding: 10px 20px;
        border: 1px solid #000;
        background: #000;
        color: #fff;
        font-family: 'Space Mono', monospace;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        cursor: pointer;
        z-index: 10;
        transition: background 0.2s, color 0.2s;
        display: none; /* 기본적으로 숨김 */
    }
    #pdfBtn:hover {
        background: #0000ff;
        border-color: #0000ff;
    }

    /* 조작 패널 */
    #panel { position:fixed; left:20px; bottom:20px; width:calc(100% - 40px); max-width:280px;; padding:15px; z-index:3000; }
    .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
    #ui-title { font-size: 20px; letter-spacing: -0.01em; font-weight: 800; text-transform: uppercase; } 
    .lang-switcher { font-size: 11px; font-weight: 600; cursor: pointer; border-bottom: 1.5px solid #000; }
    #status { font-size: 9px; color: #bbb; margin-bottom: 12px; display: block; }
    #tol { width:100%; margin:8px 0; -webkit-appearance:none; background:#3770ff; height:1.2px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#ff1818; border:1px solid #ff1818; cursor:pointer; }
</style>
</head>
<body onclick="if(event.target.id==='detailView') closeDetail()">

<div id="guide-left">drag to define ratio</div>
<div id="coords">x: 0000, y: 0000</div>
<div id="stage"><div id="dragBox"><div id="ratioTag">1:1.00</div></div></div>

<div id="detailView" onclick="closeDetail()">
    <div id="closeDetail" onclick="closeDetail()">CLOSE</div>
    <div id="detailName" onclick="goToLink()"></div>
    <img id="detailBgImg" src="" onerror="this.style.display='none'">
    <div id="detailPointBox" onclick="event.stopPropagation()"></div>
    <div id="detailMeta"><span id="detailTime"></span> • <span id="detailLevel"></span></div>
    
    <button id="pdfBtn" onclick="openPDF(event)">OPEN PDF</button>
    
    <div id="detailLangToggle" onclick="toggleLang()">ENG / KR</div>
</div>

<div id="panel">
    <div class="panel-header">
        <h1 id="ui-title">ORIGAMI ARCHIVE.V1</h1> 
        <div class="lang-switcher" onclick="toggleLang()">EN / KR</div>
    </div>
    <div id="status">SYNCED WITH GOOGLE SHEETS</div>
    <div style="margin-top:8px;">
        <label style="font-size: 11px; font-weight: 600;"><span id="ui-tol">TOLERANCE</span>: <span id="tolText">30%</span></label>
        <input type="range" min="1" max="100" value="30" id="tol">
    </div>
</div>

<script>
let currentLang = 'KR';
let currentActiveItem = null;
const translations = { 
    KR: { title: "접기의 아카이브", tol: "오차 범위", status: "구글 시트 데이터와 동기화됨", close: "닫기", pdf: "PDF 도면 열기" }, 
    EN: { title: "ORIGAMI ARCHIVE", tol: "TOLERANCE", status: "SYNCED WITH GOOGLE SHEETS", close: "CLOSE", pdf: "OPEN PDF" } 
};
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${new Date().getTime()}`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = []; let isDown = false; let startX, startY;
let draggedImg = null, offX, offY;

document.addEventListener('mousedown', (e) => {
    if(e.target.classList.contains('scattered-img')) {
        draggedImg = e.target;
        offX = e.clientX - draggedImg.offsetLeft;
        offY = e.clientY - draggedImg.offsetTop;
    }
});
document.addEventListener('mousemove', (e) => {
    if(draggedImg) {
        draggedImg.style.left = (e.clientX - offX) + 'px';
        draggedImg.style.top = (e.clientY - offY) + 'px';
    }
});
document.addEventListener('mouseup', () => draggedImg = null);

function updateCoords(xVal, yVal) {
    const x = String(Math.round(xVal)).padStart(4, '0');
    const y = String(Math.round(yVal)).padStart(4, '0');
    document.getElementById('coords').innerText = `x: ${x}, y: ${y}`;
}

function handleStart(e) {
    if(e.target !== stage) return;
    isDown = true;
    const pos = e.touches ? e.touches[0] : e;
    startX = pos.clientX; startY = pos.clientY;
    dragBox.style.display = "block";
    dragBox.style.width = "0px"; dragBox.style.height = "0px";
}

function handleMove(e) {
    if(!isDown) return;
    const pos = e.touches ? e.touches[0] : e;
    updateCoords(pos.clientX, pos.clientY);
    const w = Math.abs(pos.clientX - startX), h = Math.abs(pos.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(pos.clientX, startX) + "px"; dragBox.style.top = Math.min(pos.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `ratio 1:${currentR.toFixed(2)}`;
}

function handleEnd(e) {
    if(!isDown) return; isDown = false;
    const currentW = parseInt(dragBox.style.width);
    const currentH = parseInt(dragBox.style.height);
    const left = parseInt(dragBox.style.left);
    const top = parseInt(dragBox.style.top);
    dragBox.style.display = "none";
    if(currentW < 20 || currentH < 20) return;
    createResultBox(left, top, currentW, currentH, currentW > currentH ? (currentW/currentH) : (currentH/currentW));
}

stage.addEventListener("mousedown", handleStart);
window.addEventListener("mousemove", (e) => { if(!isDown) updateCoords(e.clientX, e.clientY); handleMove(e); });
window.addEventListener("mouseup", handleEnd);
stage.addEventListener("touchstart", handleStart, {passive: false});
window.addEventListener("touchmove", handleMove, {passive: false});
window.addEventListener("touchend", handleEnd);

function parseCSV(text) {
    const result = []; let row = []; let field = ""; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i]; const nextChar = text[i + 1];
        if (inQuotes) { if (char === '"' && nextChar === '"') { field += '"'; i++; } else if (char === '"') { inQuotes = false; } else { field += char; } }
        else { if (char === '"') { inQuotes = true; } else if (char === ',') { row.push(field); field = ""; } else if (char === '\n' || char === '\r') { if (field || row.length > 0) { row.push(field); result.push(row); field = ""; row = []; } if (char === '\r' && nextChar === '\n') i++; } else { field += char; } }
    }
    if (field || row.length > 0) { row.push(field); result.push(row); }
    return result;
}

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        const headers = rows[0].map(h => h.toLowerCase().trim());
        
        // 🔴 헤더에서 'pdf' 열 인덱스 추가 구하기
        const idx = { 
            name: headers.indexOf('name'), 
            image: headers.indexOf('image'), 
            ratio: headers.indexOf('ratio'), 
            point: headers.indexOf('point'), 
            point_en: headers.indexOf('point_en'), 
            level: headers.indexOf('level'), 
            time: headers.indexOf('time'), 
            link: headers.indexOf('link'),
            pdf: headers.indexOf('pdf') // 추가됨
        };
        
        db = rows.slice(1).map(row => {
            let rVal = parseFloat(row[idx.ratio]);
            return { 
                name: row[idx.name], 
                image: row[idx.image], 
                point_kr: row[idx.point], 
                point_en: (idx.point_en !== -1 && row[idx.point_en]) ? row[idx.point_en] : row[idx.point], 
                level: row[idx.level], 
                time: row[idx.time], 
                ratio: rVal, 
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal, 
                link: (idx.link !== -1) ? row[idx.link] : "",
                pdf: (idx.pdf !== -1 && row[idx.pdf]) ? row[idx.pdf].trim() : "" // 🔴 pdf 데이터 바인딩
            };
        }).filter(item => item.image && !isNaN(item.normRatio));
        updateUI();
    } catch (e) { document.getElementById("status").innerHTML = `OFFLINE`; }
}
init();

function toggleLang() { currentLang = (currentLang === 'KR') ? 'EN' : 'KR'; updateUI(); if (currentActiveItem) refreshDetailContent(); }
function updateUI() {
    const t = translations[currentLang];
    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-tol").innerText = t.tol;
    document.getElementById("closeDetail").innerText = t.close;
    document.getElementById("status").innerHTML = `● ${t.status}`;
}

function createResultBox(x, y, w, h, userRatio) {
    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));
    
    if (results.length > 0) {
        const box = document.createElement("div");
        box.className = "resultContainer";
        box.style.backgroundColor = ('#0000ff');
        Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
        stage.appendChild(box);
        
        results.forEach(item => {
            const img = document.createElement("img");
            img.src = ASSET_PATH + item.image;
            img.className = "scattered-img";
            const size = Math.min(Math.min(w, h) * 0.3, 100);
            img.style.width = size + 'px';
            img.style.left = (x + Math.random() * (w - size)) + 'px';
            img.style.top = (y + Math.random() * (h - size)) + 'px';
            img.onclick = (e) => { e.stopPropagation(); currentActiveItem = item; refreshDetailContent(); document.getElementById("detailView").style.display = "flex"; };
            stage.appendChild(img);
        });
    }
}

function refreshDetailContent() {
    const item = currentActiveItem;
    document.getElementById("detailName").innerText = item.name;
    document.getElementById("detailPointBox").innerText = (currentLang === 'KR') ? item.point_kr : item.point_en;
    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;
    document.getElementById("detailBgImg").style.display = 'block';
    
    let time = item.time || "0 MIN"; let level = item.level || "LEV.1";
    if(currentLang === 'EN') { time = time.toUpperCase().replace("분", " MIN"); level = level.toUpperCase().replace("쉬움", "EASY").replace("보통", "NORMAL").replace("어려움", "HARD").replace("매우", "VERY "); }
    document.getElementById("detailTime").innerText = time; document.getElementById("detailLevel").innerText = level.includes('LEV') ? level : `LEV.${level}`;

    // 🔴 PDF 버튼 처리 및 다국어 텍스트 적용
    const pdfBtn = document.getElementById("pdfBtn");
    if (item.pdf && (item.pdf.startsWith('http') || item.pdf.endsWith('.pdf'))) {
        pdfBtn.innerText = translations[currentLang].pdf;
        pdfBtn.style.display = "block";
    } else {
        pdfBtn.style.display = "none";
    }
}

// 🔴 PDF 파일을 새 창으로 열어주는 함수 추가
function openPDF(e) {
    e.stopPropagation(); // 부모 detailView 클릭 이벤트 전파 차단 (창 닫힘 방지)
    if (currentActiveItem && currentActiveItem.pdf) {
        window.open(currentActiveItem.pdf, '_blank');
    }
}

function goToLink() { if (currentActiveItem && currentActiveItem.link.startsWith('http')) window.open(currentActiveItem.link, '_blank'); }
function closeDetail() { document.getElementById("detailView").style.display = "none"; currentActiveItem = null; }
window.addEventListener("keydown", (e) => { if(e.code === "Space") { document.querySelectorAll(".resultContainer").forEach(el => el.remove()); document.querySelectorAll(".scattered-img").forEach(el => el.remove()); } });
</script>
</body>
</html>
