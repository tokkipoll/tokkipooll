<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Archive - Pure Minimal</title>
<style>
    /* --- 미니멀 디자인 기초 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    
    body { 
        background-color: #fff; 
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        overflow: hidden; 
        color: #000;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 박스: 아주 얇은 실선 */
    #dragBox { 
        position:absolute; 
        border:1px solid #000; 
        background: transparent;
        display:none; pointer-events:none; z-index:1000; 
    }
    
    #ratioTag { 
        position:absolute; top:-18px; left:0; 
        font-size:10px; color:#000; letter-spacing: 0.5px;
    }

    /* 결과 박스: 회전/그림자 없는 순수 직각 박스 */
    .traceBox { 
        position:absolute; 
        border:1px solid #000; 
        background: #fff;
        display: flex;
        flex-wrap: wrap; /* 여러 이미지 대응 */
        align-content: flex-start;
        padding: 10px;
        gap: 10px;
        z-index: 50;
        overflow: auto;
    }

    /* 이미지 스타일 */
    .result-img { 
        width: 60px; height: 60px;
        object-fit: contain; cursor: pointer;
        border: 1px solid #eee;
    }
    .result-img:hover { border-color: #000; }

    .result-name {
        font-size: 9px; width: 100%;
        text-transform: uppercase;
        margin-top: -5px; color: #888;
    }

    /* 상세 화면 */
    #detailView {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #fff; display: none; z-index: 2000;
        flex-direction: column; align-items: center; justify-content: center;
        padding: 60px; cursor: pointer;
    }
    #detailName { font-size: 24px; font-weight: 300; letter-spacing: 10px; margin-bottom: 40px; }
    #detailPointBox {
        border-top: 1px solid #000; border-bottom: 1px solid #000;
        padding: 50px 20px; width: 100%; max-width: 600px;
        text-align: center; font-size: 15px; line-height: 2;
    }
    #detailMeta { font-size: 10px; margin-top: 40px; letter-spacing: 2px; color: #888; }

    /* 패널 */
    #panel { 
        position:fixed; left:30px; bottom:30px; width:180px; 
        background:transparent; padding:0; z-index:2000; 
    }
    #panel h1 { font-size:11px; font-weight: bold; margin-bottom:10px; }
    #status { font-size: 9px; color: #ccc; margin-bottom: 5px; }
    #tol { width:100%; margin:10px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:8px; height:8px; background:#000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">0.00</div></div>
</div>

<div id="detailView">
    <div id="detailName">NAME</div>
    <div id="detailPointBox">POINT TEXT</div>
    <div id="detailMeta">TIME / LEVEL</div>
</div>

<div id="panel">
    <h1>Ratio Search</h1>
    <div id="status">Loading...</div>
    <input type="range" min="1" max="100" value="50" id="tol">
</div>

<script>
// CSV 데이터를 좀 더 유연하게 읽어오도록 수정했습니다.
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        
        // CSV 파싱 로직 보완
        const rows = csvText.split('\n').map(row => row.split(','));
        const headers = rows[0].map(h => h.trim().toLowerCase());
        
        const idxImage = headers.findIndex(h => h.includes('image'));
        const idxRatio = headers.findIndex(h => h.includes('ratio'));
        const idxName = headers.findIndex(h => h.includes('name'));
        const idxPoint = headers.findIndex(h => h.includes('point'));
        const idxLevel = headers.findIndex(h => h.includes('level'));
        const idxTime = headers.findIndex(h => h.includes('time'));

        db = rows.slice(1).map(row => {
            let rRaw = row[idxRatio];
            let rVal = parseFloat(rRaw);
            // 1:2 형태 처리
            if (rRaw && rRaw.includes(':')) {
                const p = rRaw.split(':');
                rVal = parseFloat(p[p.length-1]) / parseFloat(p[0]);
            }
            return {
                name: row[idxName] || "No Name",
                image: row[idxImage] ? row[idxImage].trim() : "",
                point: row[idxPoint] || "",
                level: row[idxLevel] || "",
                time: row[idxTime] || "",
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal
            };
        }).filter(item => item.image !== "");

        document.getElementById("status").innerHTML = `CONNECTED: ${db.length}`;
    } catch (e) {
        document.getElementById("status").innerHTML = `CONNECTION ERROR`;
        console.error(e);
    }
}
init();

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

stage.addEventListener("mousedown", (e) => {
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});

stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = currentR.toFixed(2);
});

stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 20 || h < 20) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tolerance = Number(document.getElementById("tol").value) / 100;
    const results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tolerance));

    if (results.length > 0) {
        results.slice(0, 10).forEach(item => {
            const img = document.createElement("img");
            img.src = ASSET_PATH + item.image;
            img.className = "result-img";
            img.onclick = (e) => { e.stopPropagation(); showDetail(item); };
            box.appendChild(img);
        });
    } else {
        box.innerHTML = `<div style="font-size:9px; color:#ccc;">NO MATCH</div>`;
    }
}

function showDetail(item) {
    const detailView = document.getElementById("detailView");
    document.getElementById("detailPointBox").innerText = item.point;
    document.getElementById("detailName").innerText = item.name;
    document.getElementById("detailMeta").innerText = `${item.time} / LEV.${item.level}`;
    detailView.style.display = "flex";
}

document.getElementById("detailView").onclick = function() { this.style.display = "none"; };
window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
