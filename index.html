<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>origami archive.v1</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

<style>
    /* --- 기초 디자인 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    
    body { 
        background: #ffffff; 
        font-family: 'Barlow Condensed', 'Courier New', Courier, monospace; 
        overflow: hidden; 
        color: #000;
        -webkit-font-smoothing: antialiased;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 가이드 */
    #dragBox { position:absolute; border:1px solid #00ff00; background: rgba(0, 255, 0, 0.02); display:none; pointer-events:none; z-index:1000; }
    #ratioTag { 
        position:absolute; top:-25px; left:0; background:#00ff00; color:#000; 
        font-size:11px; font-weight:700; padding:2px 6px; font-family: 'Space Mono', monospace;
    }

    /* 1. 결과 박스 레이아웃 (헤더 선 제거) */
    .traceBox { position:absolute; border:1px solid #000; background: #fff; z-index: 50; display: flex; flex-direction: column; }
    .box-header { 
        height: 24px; 
        border-bottom: none; /* [수정] ratio 밑의 선 제거 */
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 10px; font-size: 11px; background: #fff; 
        font-weight: 500; letter-spacing: 0.02em;
        color: #999; /* [수정] 헤더 텍스트 색상 톤다운 */
        font-family: 'Space Mono', monospace;
        text-transform: lowercase;
    }

    .image-list { flex: 1; display: flex; overflow-x: auto; padding: 15px; gap: 20px; align-items: center; }
    .image-list::-webkit-scrollbar { height: 2px; }
    .image-list::-webkit-scrollbar-thumb { background: #00ff00; }

    .item-wrapper { height: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .result-img { height: calc(100% - 25px); width: auto; object-fit: contain; border: 1px solid #f2f2f2; }
    
    .item-name { 
        font-size: 12px; margin-top: 10px; color: #000; text-transform: lowercase; 
        font-weight: 400; letter-spacing: -0.02em; 
    }

    /* 2. 상세 화면 모달 */
    #detailView { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; 
        display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; 
    }

    #detailBgImg { 
        position: absolute; max-width: 65vw; max-height: 65vh; opacity: 0.12; 
        z-index: 1; filter: grayscale(1); object-fit: contain; pointer-events: none; 
        top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    
    #detailName { 
        font-size: 58px; font-weight: 600; margin-bottom: 35px; text-decoration: none; 
        letter-spacing: -0.03em; cursor: pointer; transition: color 0.2s; z-index: 10; color: #000;
        text-transform: lowercase;
    }
    #detailName:hover { color: #00ff00; }

    #detailPointBox { 
        border: 1px solid #000; padding: 50px; 
        display: flex; align-items: center; justify-content: center; 
        text-align: center; font-size: 16px; line-height: 1.8; 
        background: rgba(255, 255, 255, 0.9); 
        transition: width 0.5s ease, height 0.5s ease; 
        overflow-y: auto; z-index: 5; font-weight: 400;
        max-width: 85vw; max-height: 55vh;
    }

    /* [수정] 상세 페이지 메타 데이터 색상 톤다운 */
    #detailMeta { 
        margin-top: 40px; font-size: 14px; color: #aaa; /* [수정] 더 연한 회색으로 */
        letter-spacing: 2px; font-weight: 400; z-index: 10; 
        font-family: 'Space Mono', monospace;
        text-transform: lowercase;
    }
    #closeDetail { 
        position: absolute; top: 40px; right: 40px; font-size: 12px; cursor: pointer; 
        border-bottom: 1px solid #000; font-weight: 700; z-index: 100;
    }

    /* 3. 조작 패널 */
    #panel { position:fixed; left:30px; bottom:30px; width:330px; background:#fff; padding:28px; border:1px solid #000; z-index:3000; }
    .panel-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; }
    #ui-title { font-size: 18px; letter-spacing: -0.01em; font-weight: 700; text-transform: lowercase; } 
    .lang-switcher { font-size: 12px; font-weight: 700; cursor: pointer; border-bottom: 1.5px solid #000; }

    #status { font-size: 11px; color: #999; margin-bottom: 20px; display: block; font-weight: 500; font-family: 'Space Mono', monospace; text-transform: lowercase; }
    #tol { width:100%; margin:15px 0; -webkit-appearance:none; background:#000; height:1.5px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:#00ff00; border:2px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">ratio 1:1.00</div></div>
</div>

<div id="detailView">
    <div id="closeDetail" onclick="closeDetail()">close</div>
    <div id="detailName" onclick="goToLink()"></div>
    <img id="detailBgImg" src="" onerror="this.style.display='none'">
    <div id="detailPointBox" onclick="event.stopPropagation()"></div>
    <div id="detailMeta">
        <span id="detailTime"></span> • <span id="detailLevel"></span>
    </div>
</div>

<div id="panel">
    <div class="panel-header">
        <h1 id="ui-title">origami archive.v1</h1> 
        <div class="lang-switcher" onclick="toggleLang()">en / kr</div>
    </div>
    <div id="status">synced with google sheets</div>
    <div style="margin-top:10px;">
        <label style="font-size: 12px; font-weight: 600;"><span id="ui-tol">tolerance</span>: <span id="tolText">30%</span></label>
        <input type="range" min="1" max="100" value="30" id="tol">
    </div>
</div>

<script>
let currentLang = 'KR';
let currentActiveItem = null;

const translations = {
    KR: { title: "기록.v1", tol: "오차 범위", status: "구글 시트 데이터와 동기화됨", close: "닫기" },
    EN: { title: "origami archive.v1", tol: "tolerance", status: "synced with google sheets", close: "close" }
};

const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${new Date().getTime()}`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

function parseCSV(text) {
    const result = []; let row = []; let field = ""; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i]; const nextChar = text[i + 1];
        if (inQuotes) {
            if (char === '"' && nextChar === '"') { field += '"'; i++; }
            else if (char === '"') { inQuotes = false; }
            else { field += char; }
        } else {
            if (char === '"') { inQuotes = true; }
            else if (char === ',') { row.push(field); field = ""; }
            else if (char === '\n' || char === '\r') {
                if (field || row.length > 0) { row.push(field); result.push(row); field = ""; row = []; }
                if (char === '\r' && nextChar === '\n') i++;
            } else { field += char; }
        }
    }
    if (field || row.length > 0) { row.push(field); result.push(row); }
    return result;
}

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText);
        const headers = rows[0].map(h => h.toLowerCase().trim());
        const idx = { name: headers.indexOf('name'), image: headers.indexOf('image'), ratio: headers.indexOf('ratio'), point: headers.indexOf('point'), point_en: headers.indexOf('point_en'), level: headers.indexOf('level'), time: headers.indexOf('time'), link: headers.indexOf('link') };
        
        db = rows.slice(1).map(row => {
            let rVal = parseFloat(row[idx.ratio]);
            return { 
                name: row[idx.name], image: row[idx.image], point_kr: row[idx.point], 
                point_en: (idx.point_en !== -1 && row[idx.point_en]) ? row[idx.point_en] : row[idx.point], 
                level: row[idx.level], time: row[idx.time], ratio: rVal, 
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal, link: (idx.link !== -1) ? row[idx.link] : "" 
            };
        }).filter(item => item.image && !isNaN(item.normRatio));
        updateUI();
    } catch (e) { document.getElementById("status").innerHTML = `offline`; }
}
init();

function toggleLang() {
    currentLang = (currentLang === 'KR') ? 'EN' : 'KR';
    updateUI();
    if (currentActiveItem) refreshDetailContent();
}

function updateUI() {
    const t = translations[currentLang];
    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-tol").innerText = t.tol;
    document.getElementById("closeDetail").innerText = t.close;
    document.getElementById("status").innerHTML = t.status;
}

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

document.getElementById("tol").addEventListener("input", (e) => { 
    document.getElementById("tolText").innerText = e.target.value + "%"; 
});

stage.addEventListener("mousedown", (e) => {
    if(e.target !== stage) return;
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});
stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `ratio 1:${currentR.toFixed(2)}`;
});
stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 25 || h < 25) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);
    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));
    if (results.length > 0) {
        box.innerHTML = `<div class="box-header"><span>1:${userRatio.toFixed(1)}</span><span>${results.length} units</span></div>
            <div class="image-list">${results.map(item => `
                <div class="item-wrapper" onclick="event.stopPropagation(); openDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                    <img src="${ASSET_PATH + item.image}" class="result-img" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
                    <span class="item-name">${item.name}</span>
                </div>`).join('')}</div>`;
    }
}

function openDetail(encoded) {
    currentActiveItem = JSON.parse(decodeURIComponent(atob(encoded)));
    refreshDetailContent();
    document.getElementById("detailView").style.display = "flex";
}

function refreshDetailContent() {
    const item = currentActiveItem;
    const nameEl = document.getElementById("detailName");
    nameEl.innerText = item.name;
    nameEl.style.cursor = (item.link && item.link.startsWith('http')) ? "pointer" : "default";

    document.getElementById("detailPointBox").innerText = (currentLang === 'KR') ? item.point_kr : item.point_en;
    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;

    // 면적 기반 비율 가변 박스 계산
    const baseArea = 180000; 
    let r = parseFloat(item.ratio) || 1;
    let targetW = Math.sqrt(baseArea * r);
    let targetH = baseArea / targetW;

    const boxEl = document.getElementById("detailPointBox");
    boxEl.style.width = Math.max(targetW, 350) + "px";
    boxEl.style.height = Math.max(targetH, 200) + "px";

    let time = item.time || "0 min"; let level = item.level || "lev.1";
    if(currentLang === 'EN') { 
        time = time.toUpperCase().replace("분", " MIN"); 
        level = level.toUpperCase().replace("쉬움", "EASY").replace("보통", "NORMAL").replace("어려움", "HARD").replace("매우", "VERY "); 
    }
    document.getElementById("detailTime").innerText = time; 
    document.getElementById("detailLevel").innerText = level.includes('lev') ? level : `lev.${level}`;
}

function goToLink() { if (currentActiveItem && currentActiveItem.link.startsWith('http')) window.open(currentActiveItem.link, '_blank'); }
function closeDetail() { document.getElementById("detailView").style.display = "none"; currentActiveItem = null; }
window.addEventListener("keydown", (e) => { if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove()); });
</script>
</body>
</html>
