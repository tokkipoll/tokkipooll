<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Archive - Ratio Match</title>
<style>
    /* 1. 불필요한 장식과 효과 제거, 수직/수평 실선 강조 (미니멀) */
    * { 
        margin:0; padding:0; box-sizing:border-box; 
        border-radius: 0 !important; 
    }
    
    body { 
        background: #fdfdfd; /* 따뜻한 미니멀 화이트 */
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        overflow: hidden; 
        color: #000;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 가이드라인: 네온 그린 (키치 포인트) */
    #dragBox { 
        position:absolute; 
        border:1px solid #00ff00; 
        background: transparent;
        display:none; pointer-events:none; z-index:1000; 
    }
    #ratioTag { 
        position:absolute; top:-18px; left:0; 
        font-size:10px; color:#000; letter-spacing: 1px;
    }

    /* 결과 박스: 완전 투명, 깔끔한 검정 실선 프레임 */
    .traceBox { 
        position:absolute; 
        border:1px solid #000; 
        background: #fff; /* 내용이 많아도 겹치지 않게 하얀색 배경 사용 */
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        z-index: 50;
        overflow: hidden;
    }

    /* 항목 레이아웃: 크기를 과감하게 키우고 깔끔하게 정렬 */
    .result-item {
        position: relative;
        width: 100%; height: 100%;
        display: flex; flex-direction: column;
        cursor: pointer;
    }

    /* [핵심] 이미지가 잘리지 않고 비율에 맞춰 상자에 꽉 참 */
    .result-img { 
        width: 100%; height: 100%;
        object-fit: cover; /* 비율에 맞춰 꽉 채움, 원본 비율 유지 */
        border: none;
    }

    /* 미니멀한 텍스트 가이드 */
    .result-name {
        position: absolute; bottom: 8px; left: 8px;
        font-size: 9px; text-transform: uppercase;
        color: #888; letter-spacing: 1px;
        background: rgba(255,255,255,0.7); padding: 2px 4px;
    }

    /* 상세 화면 모달 */
    #detailView {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #fff; display: none; z-index: 2000;
        flex-direction: column; align-items: center; justify-content: center;
        padding: 60px; cursor: pointer;
    }
    #detailName { font-size: 24px; font-weight: 300; letter-spacing: 10px; margin-bottom: 40px; text-decoration: underline; }
    #detailPointBox {
        border-top: 1px solid #000; border-bottom: 1px solid #000;
        padding: 50px 20px; width: 100%; max-width: 600px;
        text-align: center; font-size: 15px; line-height: 2;
    }
    #detailMeta { font-size: 10px; margin-top: 40px; letter-spacing: 2px; color: #888; }

    /* 조작 패널: 간결한 정보 위주 */
    #panel { 
        position:fixed; left:30px; bottom:30px; width:180px; 
        background:#fff; padding:20px; border:1px solid #000; z-index:2000; 
        box-shadow: 4px 4px 0px rgba(0,0,0,0.05);
    }
    #panel h1 { font-size:11px; font-weight: bold; margin-bottom:10px; }
    #status { font-size: 9px; color: #ccc; margin-bottom: 5px; }
    #tol { width:100%; margin:10px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:8px; height:8px; background:#00ff00; border:1px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">0.00</div></div>
</div>

<div id="detailView">
    <div id="detailName">NAME</div>
    <div id="detailPointBox">POINT TEXT</div>
    <div id="detailMeta">TIME / LEVEL</div>
</div>

<div id="panel">
    <h1>Archive: Ratio</h1>
    <div id="status">Scanning Sheet...</div>
    <input type="range" min="1" max="100" value="50" id="tol">
</div>

<script>
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        
        // CSV 파싱 정밀화 및 유연한 헤더 찾기
        const rows = csvText.split('\n').map(row => row.split(','));
        const headers = rows[0].map(h => h.trim().toLowerCase());
        
        const idx = {
            name: headers.findIndex(h => h.toLowerCase().includes('name')),
            image: headers.findIndex(h => h.toLowerCase().includes('image')),
            ratio: headers.findIndex(h => h.toLowerCase().includes('ratio')),
            point: headers.findIndex(h => h.toLowerCase().includes('point')),
            level: headers.findIndex(h => h.toLowerCase().includes('level')),
            time: headers.findIndex(h => h.toLowerCase().includes('time'))
        };

        db = rows.slice(1).map(row => {
            let rRaw = row[idx.ratio];
            let rVal = parseFloat(rRaw);
            // "1:2.5" 형태 문자열 처리
            if (rRaw && rRaw.includes(':')) {
                const parts = rRaw.split(':');
                rVal = parseFloat(parts[parts.length - 1]) / parseFloat(parts[0] || 1);
            }
            return {
                name: row[idx.name] || "Unknown",
                image: row[idx.image] ? row[idx.image].trim() : "",
                point: row[idx.point] || "",
                level: row[idx.level] || "",
                time: row[idx.time] || "",
                // 비율 정규화: 1보다 작은 비율은 검색 편의를 위해 역수 처리
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal
            };
        }).filter(item => item.image !== "");

        document.getElementById("status").innerHTML = `Loaded: ${db.length} Objects`;
    } catch (e) {
        document.getElementById("status").innerHTML = `Sheet Error`;
        console.error(e);
    }
}
init();

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

stage.addEventListener("mousedown", (e) => {
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});

stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `Ratio 1:${currentR.toFixed(2)}`;
});

stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 20 || h < 20) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tolerance = Number(document.getElementById("tol").value) / 100;
    // 오차 범위 내의 항목 검색
    const results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tolerance));

    if (results.length > 0) {
        // [레이아웃] 가장 적합한 하나를 상자에 꽉 차게 표시
        const item = results[0]; 
        box.innerHTML = `
            <div class="result-item" onclick="event.stopPropagation(); showDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                <img src="${ASSET_PATH + item.image}" class="result-img">
                <div class="result-name">${item.name}</div>
            </div>
        `;
    } else {
        box.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; font-size:9px; color:#ccc;">NO MATCH (1:${userRatio.toFixed(1)})</div>`;
    }
    
    // 흔적 관리 (최근 8개만 유지)
    const all = document.querySelectorAll(".traceBox");
    if(all.length > 8) all[0].remove();
}

function showDetail(encodedItem) {
    const item = JSON.parse(decodeURIComponent(atob(encodedItem)));
    const detailView = document.getElementById("detailView");
    document.getElementById("detailPointBox").innerText = item.point;
    document.getElementById("detailName").innerText = item.name;
    document.getElementById("detailMeta").innerText = `${item.time} / LEV.${item.level}`;
    detailView.style.display = "flex";
}

document.getElementById("detailView").onclick = function() { this.style.display = "none"; };
window.addEventListener("keydown", (e) => {
    // 스페이스바를 누르면 화면 초기화
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
