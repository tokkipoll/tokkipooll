<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokkipooll Ratio Finder</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
  background:#886262;
  background-image:radial-gradient(#ddd 1px, transparent 1px);
  background-size:20px 20px;
  cursor:crosshair;
}

/* 좌표 */
.coord{
  position:fixed;
  top:20px;
  right:25px;
  font-size:11px;
  font-weight:700;
  z-index:9999;
}

/* 슬라이더 */
.panel{
  position:fixed;
  bottom:25px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:14px;
  align-items:center;
  background:rgba(255,255,255,.96);
  padding:12px 24px;
  border-radius:50px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  z-index:9999;
}

.panel span{
  font-size:14px;
  font-weight:700;
}

/* 드래그 박스 */
.box{
  position:absolute;
  border:1px solid #333;
  background:#fff;
  box-shadow:0 10px 20px rgba(0,0,0,.08);
  overflow:auto;
  pointer-events:none;
  z-index:5000;
}

.label{
  position:absolute;
  top:-18px;
  left:0;
  font-size:10px;
  font-weight:700;
  color:#3b48ff;
}

/* 결과 카드 */
.wrap{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:12px;
  justify-content:center;
}

.card{
  width:95px;
  text-align:center;
  pointer-events:auto;
  cursor:pointer;
}

.card img{
  width:95px;
  height:70px;
  object-fit:contain;
}

.name{
  font-size:10px;
  font-weight:700;
  margin-top:4px;
}

/* 모달 */
.modal{
  position:fixed;
  inset:0;
  background:rgba(255,255,255,.97);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10000;
}

.modal.active{
  display:flex;
}

.inner{
  text-align:center;
  max-width:500px;
}

.inner img{
  max-width:260px;
  max-height:260px;
}

.inner h2{
  margin-top:20px;
}

.inner p{
  margin-top:10px;
  color:#666;
  line-height:1.6;
}

button{
  margin-top:20px;
  padding:10px 18px;
  border:1px solid #333;
  background:#fff;
  cursor:pointer;
  font-weight:700;
}
</style>
</head>

<body>

<div class="coord" id="coord">0 / 0</div>

<div class="panel">
  <small>Tolerance</small>
  <input type="range" min="0" max="100" value="40" id="slider">
  <span id="val">40%</span>
</div>

<div class="modal" id="modal">
  <div class="inner">
    <img id="mimg">
    <h2 id="mtitle"></h2>
    <p id="mpoint"></p>
    <button onclick="closeModal()">CLOSE</button>
  </div>
</div>

<script>
const sheetId = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const gid = "0";
const baseFolder = "assets/";

let database=[];

/* ---------------- CSV LOAD ---------------- */
async function init(){

 const url=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;

 const res=await fetch(url);
 const text=await res.text();

 const rows=text.trim().split(/\r?\n/).map(row =>
   row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g)?.map(v =>
     v.replace(/^"|"$/g,'').trim()
   ) || []
 );

 database = rows.slice(1).map(cols=>{

   const ratio = normalize(cols[2]);

   if(!cols[0] || !cols[1] || !ratio) return null;

   return{
     name: cols[0],
     image: cols[1],
     ratio: ratio,
     point: cols[3] || ""
   };

 }).filter(Boolean);

 console.log(database);
}

function normalize(raw){

 if(!raw) return null;

 raw = String(raw)
   .replace(/\s/g,'')
   .replace(/：/g,':')
   .replace(',', '.');

 if(raw.includes(':')){
   let [a,b] = raw.split(':').map(Number);
   if(!a || !b) return null;

   let r = b/a;
   return r >=1 ? r : 1/r;
 }

 let n = parseFloat(raw);
 if(!n) return null;

 return n >=1 ? n : 1/n;
}

init();

/* ---------------- DRAG ---------------- */
let dragging=false,sx=0,sy=0,box,label;

window.addEventListener("mousedown",e=>{

 if(e.target.closest(".panel")) return;

 dragging=true;
 sx=e.clientX;
 sy=e.clientY;

 box=document.createElement("div");
 box.className="box";

 label=document.createElement("div");
 label.className="label";

 box.appendChild(label);
 document.body.appendChild(box);

});

window.addEventListener("mousemove",e=>{

 coord.textContent=e.clientX+" / "+e.clientY;

 if(!dragging) return;

 let w=Math.abs(e.clientX-sx);
 let h=Math.abs(e.clientY-sy);

 box.style.left=Math.min(sx,e.clientX)+"px";
 box.style.top=Math.min(sy,e.clientY)+"px";
 box.style.width=w+"px";
 box.style.height=h+"px";

 if(w>0 && h>0){
   label.textContent="1:"+(Math.max(w,h)/Math.min(w,h)).toFixed(2);
 }

});

window.addEventListener("mouseup",()=>{

 if(!dragging) return;
 dragging=false;

 const w=parseInt(box.style.width);
 const h=parseInt(box.style.height);

 if(w<20 || h<20){
   box.remove();
   return;
 }

 const userRatio=Math.max(w,h)/Math.min(w,h);

 const t=parseInt(slider.value);

 /* 핵심 */
 const range = 0.03 + (t/100)*1.2;

 const result = database.filter(item =>
   Math.abs(item.ratio-userRatio) <= range
 ).sort((a,b)=>
   Math.abs(a.ratio-userRatio)-Math.abs(b.ratio-userRatio)
 );

 if(!result.length){
   box.remove();
   return;
 }

 box.innerHTML = `
 <div class="wrap">
 ${result.map(item=>`
   <div class="card" onclick="showPop('${encodeURIComponent(item.name)}')">
     <img src="${baseFolder}${item.image}">
     <div class="name">${item.name}</div>
   </div>
 `).join("")}
 </div>
 `;
});

function showPop(n){

 const item = database.find(v=>v.name===decodeURIComponent(n));
 if(!item) return;

 mimg.src = baseFolder + item.image;
 mtitle.textContent = item.name;
 mpoint.textContent = item.point;

 modal.classList.add("active");
}

function closeModal(){
 modal.classList.remove("active");
}
</script>

</body>
</html>
