<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Archive - Design Optimized</title>
<style>
    /* --- 기초 디자인: 미니멀 & 직각 --- */
    * { 
        margin:0; padding:0; box-sizing:border-box; 
        border-radius: 0 !important; 
    }
    
    body { 
        background: #fdfdfd; 
        font-family: 'Courier New', Courier, monospace; 
        overflow: hidden; 
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 가이드라인: 네온 그린 */
    #dragBox { 
        position:absolute; 
        border:1.5px solid #00ff00; 
        background: rgba(0, 255, 0, 0.05);
        display:none; pointer-events:none; z-index:1000; 
    }
    #ratioTag { 
        position:absolute; top:-25px; left:0; 
        background:#00ff00; color:#000; 
        font-size:11px; font-weight:bold; padding:3px 8px; 
    }

    /* 결과 박스 (흔적) */
    .traceBox { 
        position:absolute; 
        border:1px solid #000; 
        background: #fff; 
        z-index: 50; 
        display: flex; 
        flex-direction: column;
    }

    /* 박스 헤더: 가독성 보완 */
    .box-header { 
        height: 22px; 
        border-bottom: 1px solid #000; 
        display: flex; align-items: center; justify-content: space-between; 
        padding: 0 10px; font-size: 9px; background: #fafafa;
        font-weight: bold; letter-spacing: 0.5px;
    }

    /* 이미지 리스트 여백 조정 */
    .image-list { 
        flex: 1; display: flex; overflow-x: auto; 
        padding: 15px; gap: 15px; align-items: center; 
    }
    .image-list::-webkit-scrollbar { height: 2px; }
    .image-list::-webkit-scrollbar-thumb { background: #00ff00; }

    .item-wrapper { 
        height: 100%; flex-shrink: 0; 
        display: flex; flex-direction: column; align-items: center; 
        cursor: pointer; transition: transform 0.2s;
    }
    .item-wrapper:hover { transform: translateY(-3px); }

    .result-img { 
        height: calc(100% - 20px); width: auto; 
        object-fit: contain; border: 1px solid #f0f0f0; 
    }

    /* [핵심 수정] 아이템 이름: 굵기 줄이고 여백 확대 */
    .item-name { 
        font-size: 9px; 
        margin-top: 10px; /* 이미지와의 간격 확대 */
        color: #333; 
        text-transform: uppercase; 
        font-weight: normal; /* 굵기를 normal로 변경 (핵심) */
        letter-spacing: 0.5px;
    }

    /* 상세 화면 (모달) */
    #detailView { 
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
        background: #fff; display: none; z-index: 2000; 
        flex-direction: column; align-items: center; justify-content: center; 
    }
    #detailBgImg { 
        position: absolute; max-width: 60vw; max-height: 60vh; 
        opacity: 0.08; z-index: -1; filter: grayscale(1); 
        object-fit: contain; pointer-events: none; 
    }
    
    /* [수정] 상세 페이지 제목: 굵기 조정 */
    #detailName { 
        font-size: 32px; font-weight: normal; /* normal로 변경 */
        margin-bottom: 40px; text-decoration: underline; 
        letter-spacing: 3px; cursor: pointer; transition: color 0.2s; 
    }
    #detailName:hover { color: #00ff00; }

    #detailPointBox { 
        border: 1.5px solid #000; padding: 50px; 
        display: flex; align-items: center; justify-content: center; 
        text-align: center; font-size: 15px; line-height: 2; 
        background: rgba(255, 255, 255, 0.95); 
        transition: all 0.5s ease; overflow-y: auto; 
        min-width: 380px; min-height: 250px;
        max-width: 80vw; max-height: 60vh;
    }

    #detailMeta { margin-top: 40px; font-size: 12px; color: #000; letter-spacing: 4px; }
    #closeDetail { position: absolute; top: 40px; right: 40px; font-size: 12px; cursor: pointer; border-bottom: 1.5px solid #000; }

    /* 조작 패널 최적화: 너비 확장 및 여백 */
    #panel { 
        position:fixed; left:30px; bottom:30px; width:300px; /* 너비를 늘려 겹침 방지 */
        background:#fff; padding:25px; border:1px solid #000; z-index:3000; 
    }
    
    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
    #ui-title { 
        font-size:11px; 
        letter-spacing: 0.5px; 
        text-transform: uppercase; 
        font-weight: bold;
        padding-right: 15px; /* 제목과 스위치 사이 간격 확보 */
    } 
    .lang-switcher { 
        font-size: 10px; cursor: pointer; border-bottom: 1.5px solid #000; padding-bottom: 2px; 
        flex-shrink: 0; /* 제목이 길어져도 줄어들지 않게 */
    }

    #status { 
        font-size: 9px; color: #00ff00; font-weight: bold; margin-bottom: 12px; 
        background: #000; display: inline-block; padding: 2px 8px; letter-spacing: 0.5px; 
    }
    #tol { width:100%; margin:15px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; background:#00ff00; border:1px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">1:1.00</div></div>
</div>

<div id="detailView">
    <div id="closeDetail" onclick="closeDetail()">CLOSE</div>
    <div id="detailName" onclick="goToLink()"></div>
    <img id="detailBgImg" src="">
    <div id="detailPointBox" onclick="event.stopPropagation()"></div>
    <div id="detailMeta">
        <span id="detailTime"></span> • <span id="detailLevel"></span>
    </div>
</div>

<div id="panel">
    <div class="panel-header">
        <h1 id="ui-title">ORIGAMI ARCHIVE.TOKKIPOOLL</h1>
        <div class="lang-switcher" onclick="toggleLang()">EN / KR</div>
    </div>
    <div id="status">SYNCED WITH GOOGLE SHEETS</div>
    <div style="margin-top:10px;">
        <label style="font-size: 10px;"><span id="ui-tol">TOLERANCE</span>: <span id="tolText">30%</span></label>
        <input type="range" min="1" max="100" value="30" id="tol">
    </div>
</div>

<script>
let currentLang = 'KR';
let currentActiveItem = null;

const translations = {
    KR: { title: "기록.TOKKIPOOLL", tol: "오차 범위", status: "구글 시트 데이터와 동기화됨", close: "닫기" },
    EN: { title: "ORIGAMI ARCHIVE.TOKKIPOOLL", tol: "TOLERANCE", status: "SYNCED WITH GOOGLE SHEETS", close: "CLOSE" }
};

const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${new Date().getTime()}`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

function safeCSVParse(text) {
    const rows = [];
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        if (!line.trim()) return;
        const row = [];
        let cur = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            let c = line[i];
            if (c === '"') inQuotes = !inQuotes;
            else if (c === ',' && !inQuotes) {
                row.push(cur.trim());
                cur = "";
            } else {
                cur += c;
            }
        }
        row.push(cur.trim());
        rows.push(row);
    });
    return rows;
}

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = safeCSVParse(csvText);
        const headers = rows[0].map(h => h.toLowerCase().trim());
        
        const idx = {
            name: headers.indexOf('name'),
            image: headers.indexOf('image'),
            ratio: headers.indexOf('ratio'),
            point: headers.indexOf('point'),
            point_en: headers.indexOf('point_en'),
            level: headers.indexOf('level'),
            time: headers.indexOf('time'),
            link: headers.indexOf('link')
        };

        db = rows.slice(1).map(row => {
            let rVal = parseFloat(row[idx.ratio]);
            return {
                name: row[idx.name],
                image: row[idx.image],
                point_kr: row[idx.point],
                point_en: (idx.point_en !== -1 && row[idx.point_en]) ? row[idx.point_en] : row[idx.point],
                level: row[idx.level],
                time: row[idx.time],
                ratio: rVal,
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal,
                link: (idx.link !== -1) ? row[idx.link] : ""
            };
        }).filter(item => !isNaN(item.normRatio) && item.image);
        updateUI();
    } catch (e) { document.getElementById("status").innerHTML = `OFFLINE`; }
}
init();

function toggleLang() {
    currentLang = (currentLang === 'KR') ? 'EN' : 'KR';
    updateUI();
    if (currentActiveItem) refreshDetailContent();
}

function updateUI() {
    const t = translations[currentLang];
    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-tol").innerText = t.tol;
    document.getElementById("closeDetail").innerText = t.close;
    document.getElementById("status").innerHTML = `● ${t.status}`;
}

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

document.getElementById("tol").addEventListener("input", (e) => { 
    document.getElementById("tolText").innerText = e.target.value + "%"; 
});

stage.addEventListener("mousedown", (e) => {
    if(e.target !== stage) return;
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});
stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `R: 1:${currentR.toFixed(2)}`;
});
stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 25 || h < 25) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);
    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));
    if (results.length > 0) {
        box.innerHTML = `<div class="box-header"><span>1:${userRatio.toFixed(1)}</span><span>${results.length} UNITS</span></div>
            <div class="image-list">${results.map(item => `
                <div class="item-wrapper" onclick="event.stopPropagation(); openDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                    <img src="${ASSET_PATH + item.image}" class="result-img" onerror="this.src='data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII='">
                    <span class="item-name">${item.name}</span>
                </div>`).join('')}</div>`;
    }
}

function openDetail(encoded) {
    currentActiveItem = JSON.parse(decodeURIComponent(atob(encoded)));
    refreshDetailContent();
    document.getElementById("detailView").style.display = "flex";
}

function refreshDetailContent() {
    const item = currentActiveItem;
    const nameEl = document.getElementById("detailName");
    nameEl.innerText = item.name;

    if(item.link && item.link.startsWith('http')) {
        nameEl.style.textDecoration = "underline";
        nameEl.style.cursor = "pointer";
    } else {
        nameEl.style.textDecoration = "none";
        nameEl.style.cursor = "default";
    }

    document.getElementById("detailPointBox").innerText = (currentLang === 'KR') ? item.point_kr : item.point_en;
    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;

    const baseSize = 400;
    const r = item.ratio || 1;
    document.getElementById("detailPointBox").style.width = (r >= 1 ? baseSize : baseSize * r) + "px";
    document.getElementById("detailPointBox").style.height = (r >= 1 ? baseSize / r : baseSize) + "px";

    let time = item.time || "0 MIN";
    let level = item.level || "LEV.1";
    if(currentLang === 'EN') {
        time = time.toUpperCase().replace("분", " MIN");
        level = level.toUpperCase().replace("쉬움", "EASY").replace("보통", "NORMAL").replace("어려움", "HARD").replace("매우", "VERY ");
    }
    document.getElementById("detailTime").innerText = time;
    document.getElementById("detailLevel").innerText = level.includes('LEV') ? level : `LEV.${level}`;
}

function goToLink() {
    if (currentActiveItem && currentActiveItem.link.startsWith('http')) window.open(currentActiveItem.link, '_blank');
}

function closeDetail() { document.getElementById("detailView").style.display = "none"; currentActiveItem = null; }
window.addEventListener("keydown", (e) => { if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove()); });
</script>
</body>
</html>
