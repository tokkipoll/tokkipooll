<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Origami Ratio Search Lab</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, Helvetica, sans-serif;
    background:#ececec;
    overflow:hidden;
    color:#222;
}

/* 메인 공간 */
#stage{
    position:relative;
    width:100vw;
    height:100vh;
    cursor:crosshair;
}

/* 실시간 드래그 박스 */
#dragBox{
    position:absolute;
    border:1px solid rgba(0,0,0,0.55);
    background:rgba(255,255,255,0.06);
    display:none;
    pointer-events:none;
}

/* 남는 흔적 박스 */
.trace{
    position:absolute;
    border:1px solid rgba(0,0,0,0.32);
    pointer-events:none;
}

/* 비율 표시 */
#ratioTag{
    position:absolute;
    top:-24px;
    left:0;
    font-size:11px;
    padding:3px 7px;
    background:#111;
    color:#fff;
    letter-spacing:.3px;
    white-space:nowrap;
}

/* 좌표 */
#coords{
    position:fixed;
    top:18px;
    right:18px;
    font-size:12px;
    background:rgba(255,255,255,0.9);
    padding:8px 10px;
    border:1px solid rgba(0,0,0,0.15);
}

/* 하단 컨트롤 */
#panel{
    position:fixed;
    left:18px;
    bottom:18px;
    width:260px;
    background:rgba(255,255,255,0.94);
    border:1px solid rgba(0,0,0,0.12);
    padding:14px;
}

#panel h1{
    font-size:14px;
    font-weight:700;
    margin-bottom:10px;
}

#panel label{
    font-size:12px;
    display:block;
    margin-bottom:6px;
}

#tol{
    width:100%;
}

#meta{
    margin-top:10px;
    font-size:11px;
    line-height:1.5;
    color:#555;
}

/* 결과 영역 */
#results{
    position:fixed;
    right:18px;
    bottom:18px;
    width:330px;
    max-height:68vh;
    overflow-y:auto;
    background:rgba(255,255,255,0.96);
    border:1px solid rgba(0,0,0,0.12);
    padding:14px;
}

#results h2{
    font-size:14px;
    margin-bottom:12px;
}

.card{
    margin-bottom:16px;
    padding-bottom:14px;
    border-bottom:1px solid rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    display:block;
    margin-bottom:8px;
    background:#f2f2f2;
}

.card .name{
    font-size:13px;
    font-weight:700;
}

.card .sub{
    font-size:11px;
    color:#666;
    margin-top:4px;
}

.empty{
    font-size:12px;
    color:#777;
    line-height:1.5;
}
</style>
</head>

<body>

<div id="stage">
    <div id="dragBox">
        <div id="ratioTag">1 : 1.00</div>
    </div>
</div>

<div id="coords">X:0 Y:0</div>

<div id="panel">
    <h1>Origami Ratio Search</h1>

    <label>
        Tolerance :
        <span id="tolText">20%</span>
    </label>
    <input type="range" min="0" max="100" value="20" id="tol">

    <div id="meta">
        Drag empty space to draw a ratio box.<br>
        Spacebar = clear traces<br>
        Lower tolerance = stricter search
    </div>
</div>

<div id="results">
    <h2>Recommended</h2>
    <div id="list" class="empty">
        Draw a rectangle to begin searching.
    </div>
</div>

<script>
/* ==========================
   구글 시트 JSON 주소
========================== */
const SHEET_URL =
"https://opensheet.elk.sh/1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60/Sheet1";

/* ==========================
   상태값
========================== */
let db = [];
let isDown = false;
let startX = 0;
let startY = 0;

/* ==========================
   요소
========================== */
const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");
const ratioTag = document.getElementById("ratioTag");
const coords = document.getElementById("coords");
const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");
const list = document.getElementById("list");

/* ==========================
   시트 불러오기
========================== */
fetch(SHEET_URL)
.then(r => r.json())
.then(data => {
    db = data;
})
.catch(() => {
    list.innerHTML = `<div class="empty">Google Sheet load failed.</div>`;
});

/* ==========================
   Tolerance 표시
========================== */
tol.addEventListener("input", () => {
    tolText.textContent = tol.value + "%";
});

/* ==========================
   마우스 다운
========================== */
stage.addEventListener("mousedown", (e) => {
    isDown = true;

    startX = e.clientX;
    startY = e.clientY;

    dragBox.style.display = "block";
    dragBox.style.left = startX + "px";
    dragBox.style.top = startY + "px";
    dragBox.style.width = "0px";
    dragBox.style.height = "0px";
});

/* ==========================
   마우스 이동
========================== */
stage.addEventListener("mousemove", (e) => {

    coords.innerHTML = `X:${e.clientX} Y:${e.clientY}`;

    if(!isDown) return;

    const x = Math.min(startX, e.clientX);
    const y = Math.min(startY, e.clientY);
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);

    dragBox.style.left = x + "px";
    dragBox.style.top = y + "px";
    dragBox.style.width = w + "px";
    dragBox.style.height = h + "px";

    if(h > 3){
        const ratio = (w / h).toFixed(2);
        ratioTag.innerHTML = `1 : ${ratio}`;
    }
});

/* ==========================
   마우스 업
========================== */
stage.addEventListener("mouseup", (e) => {

    if(!isDown) return;
    isDown = false;

    const x = Math.min(startX, e.clientX);
    const y = Math.min(startY, e.clientY);
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);

    dragBox.style.display = "none";

    if(w < 8 || h < 8) return;

    /* 흔적 남기기 */
    createTrace(x,y,w,h);

    /* 검색 */
    const ratio = w / h;
    searchRatio(ratio);
});

/* ==========================
   흔적 생성
========================== */
function createTrace(x,y,w,h){

    const div = document.createElement("div");
    div.className = "trace";

    div.style.left = x + "px";
    div.style.top = y + "px";
    div.style.width = w + "px";
    div.style.height = h + "px";

    stage.appendChild(div);

    fadeTrace();
}

/* ==========================
   오래된 흔적 흐리기
========================== */
function fadeTrace(){

    const traces = document.querySelectorAll(".trace");

    traces.forEach((box, i) => {
        const total = traces.length;
        const opacity = Math.max(0.12, (i + 1) / total);
        box.style.opacity = opacity;
    });

    if(traces.length > 22){
        traces[0].remove();
    }
}

/* ==========================
   검색 로직
========================== */
function searchRatio(userRatio){

    if(!db.length){
        list.innerHTML = `<div class="empty">Database loading...</div>`;
        return;
    }

    const t = Number(tol.value) / 100;

    let result = db.filter(item => {

        const r = parseFloat(item.ratio);

        if(isNaN(r)) return false;

        const diff = Math.abs(r - userRatio);

        return diff <= userRatio * t;
    });

    result.sort((a,b)=>{
        return Math.abs(a.ratio-userRatio) - Math.abs(b.ratio-userRatio);
    });

    render(result.slice(0,8), userRatio);
}

/* ==========================
   렌더링
========================== */
function render(items, userRatio){

    if(items.length === 0){
        list.innerHTML = `
        <div class="empty">
        No result found.<br><br>
        Ratio : ${userRatio.toFixed(2)}<br>
        Increase tolerance.
        </div>`;
        return;
    }

    list.innerHTML = "";

    items.forEach(item => {

        const img = item.image
            ? `<img src="${item.image}" alt="">`
            : "";

        const html = `
        <div class="card">
            ${img}
            <div class="name">${item.name || "Untitled"}</div>
            <div class="sub">
                ratio : ${item.ratio}
            </div>
        </div>
        `;

        list.innerHTML += html;
    });
}

/* ==========================
   스페이스바 = 흔적 삭제
========================== */
window.addEventListener("keydown",(e)=>{
    if(e.code === "Space"){
        document.querySelectorAll(".trace").forEach(el=>el.remove());
    }
});
</script>

</body>
</html>
