<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokkipooll - Data Visualization</title>
<style>
  body { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #ffffff; overflow: hidden; user-select: none; cursor: crosshair; }
  .drag-box { position: absolute; background-color: rgba(59, 72, 255, 0.02); border: 1px solid rgba(59, 72, 255, 0.15); overflow: hidden; pointer-events: none; display: flex; align-items: center; box-sizing: border-box; }
  .drag-content { display: flex; align-items: center; gap: 12px; padding: 10px; width: max-content; height: 100%; box-sizing: border-box; }
  .drag-content img { height: 85%; width: auto; object-fit: contain; display: block; }
  #status-bar { position: fixed; bottom: 15px; left: 15px; font-family: monospace; font-size: 10px; color: #3b48ff; background: rgba(255,255,255,0.9); padding: 6px 10px; border: 1px solid #3b48ff; z-index: 100; }
  .instruction { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: sans-serif; color: #f0f0f0; pointer-events: none; z-index: -1; font-size: 1rem; text-align: center; }
</style>
</head>
<body>

  <div id="status-bar">Connecting to Database...</div>
  <div class="instruction">화면을 드래그하세요<br>Tokkipooll Data Sync Active</div>

<script>
  let isDragging = false;
  let startX, startY;
  let currentBox = null;
  let weightedImagePool = []; 

  // --- 설정 데이터 ---
  const sheetId = '1--r68ndYvKgPbaBpPE6ovJHm5ekD9S2It0EGw3wk2Us';
  const gid = '59083326'; 
  const baseFolder = 'foldingpapers/assets/'; 

  async function loadData() {
    const status = document.getElementById('status-bar');
    // 구글 시트 웹 게시 CSV 경로 (가장 안정적인 형식)
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/pub?gid=${gid}&single=true&output=csv`;

    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error('네트워크 응답 에러');
      const csvText = await response.text();
      
      const rows = csvText.split('\n');
      let pool = [];

      for (let i = 1; i < rows.length; i++) {
        const cols = rows[i].split(',');
        if (cols.length >= 2) {
          const name = cols[0].replace(/"/g, '').trim(); 
          const count = parseInt(cols[1].replace(/"/g, '').trim()); 
          
          if (name && !isNaN(count) && count > 0) {
            const fileName = name.toLowerCase().endsWith('.png') ? name : name + '.png';
            for (let j = 0; j < count; j++) {
              pool.push(fileName);
            }
          }
        }
      }

      if (pool.length === 0) throw new Error('데이터 파싱 실패 (시트 형식을 확인하세요)');
      
      weightedImagePool = pool;
      status.innerText = `Data Loaded: ${pool.length} items`;
      setTimeout(() => status.style.opacity = '0.3', 2000);

    } catch (err) {
      status.innerText = "Connect Error. GitHub에 푸시 후 온라인 주소에서 확인하세요.";
      status.style.color = "red";
    }
  }

  loadData();

  document.addEventListener('mousedown', (e) => {
    if (weightedImagePool.length === 0) return;
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    currentBox = document.createElement('div');
    currentBox.className = 'drag-box';
    const contentWrapper = document.createElement('div');
    contentWrapper.className = 'drag-content';
    
    // 비율에 따라 15개 랜덤 생성
    for (let i = 0; i < 15; i++) {
      const imgName = weightedImagePool[Math.floor(Math.random() * weightedImagePool.length)];
      const imgTag = document.createElement('img');
      imgTag.src = baseFolder + imgName;
      imgTag.onerror = function() { this.style.display = 'none'; };
      contentWrapper.appendChild(imgTag);
    }
    currentBox.appendChild(contentWrapper);
    currentBox.style.left = startX + 'px'; currentBox.style.top = startY + 'px';
    document.body.appendChild(currentBox);
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);
    currentBox.style.width = w + 'px'; currentBox.style.height = h + 'px';
    currentBox.style.left = Math.min(e.clientX, startX) + 'px';
    currentBox.style.top = Math.min(e.clientY, startY) + 'px';
  });

  document.addEventListener('mouseup', () => { isDragging = false; currentBox = null; });
</script>
</body>
</html>
</html>
