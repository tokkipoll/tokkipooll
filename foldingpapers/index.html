<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tokkipooll - Minimalist Blueprint</title>
<style>
  /* 🌟 전체 폰트를 깔끔한 모던 고딕체로 통일 */
  body {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: #ffffff; 
    background-image: 
      linear-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 0, 0, 0.05) 1px, transparent 1px);
    background-size: 20px 20px;
    overflow: hidden; user-select: none; cursor: crosshair; 
    font-family: 'Pretendard', 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }

  .coord-tracker {
    position: fixed; top: 25px; right: 30px;
    font-size: 13px; color: #333; font-weight: 700;
    letter-spacing: 0.5px; pointer-events: none; z-index: 50;
  }

  .control-panel {
    position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 15px; z-index: 100;
  }
  .control-panel label { font-size: 14px; color: #888; font-weight: 600; letter-spacing: -0.3px; }
  .tol-value { font-size: 14px; color: #333; font-weight: 800; width: 32px; text-align: right; }
  
  input[type="range"] { -webkit-appearance: none; appearance: none; width: 150px; background: transparent; cursor: pointer; }
  input[type="range"]:focus { outline: none; }
  input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: #e0e0e0; border-radius: 2px; }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #333; margin-top: -7px; transition: transform 0.2s ease;
  }
  input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.3); }

  /* 🌟 드래그 박스 선 굵기 조절 (더 얇고 세밀하게) */
  .drag-box {
    position: absolute; background-color: rgba(0, 0, 0, 0.02); 
    border: 1px dashed #888; /* 얇고 부드러운 점선 */
    box-sizing: border-box; 
    overflow: visible; 
    transition: background-color 0.4s ease, border 0.4s ease; z-index: 10;
  }

  .dimension-label {
    position: absolute; bottom: -25px; right: -1px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.5px;
    color: white; background-color: #333; padding: 3px 6px;
    white-space: nowrap; pointer-events: none;
  }

  .drag-box.show-result { 
    border: 1px solid #222; /* 1.5px에서 1px 얇은 실선으로 변경 */
    pointer-events: auto; 
  }
  .drag-box.show-result .dimension-label { display: none; } 

  .suggestion-content { 
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; 
    display: flex; flex-wrap: wrap; 
    justify-content: center; align-items: center; gap: 15px;
    padding: 15px; box-sizing: border-box; 
    overflow: hidden; 
  }

  .matched-item {
    cursor: pointer;
    transition: transform 0.2s ease;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    flex: 1 1 auto; 
    max-width: 45%; 
    max-height: 80%;
  }
  .matched-item:hover { transform: scale(1.1); }
  
  .matched-item img { 
    max-width: 100%; max-height: 100%;
    object-fit: contain; 
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.1));
  }

  /* 라벨도 고딕체로 깔끔하게 */
  .matched-label {
    font-size: 12px; font-weight: 600; color: #555; margin-top: 8px; text-align: center;
  }

  /* 모달 & 타이머 스타일 */
  .modal {
    position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    background-color: #f5f5f5; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  }
  .modal.active { opacity: 1; pointer-events: auto; }
  .modal-timer-bg { position: absolute; top: 0; left: 0; height: 100%; width: 100%; z-index: 1; }
  .modal-main-content { position: relative; z-index: 2; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100%; color: white; transition: opacity 1s ease; }
  .modal-image { width: 200px; height: 200px; object-fit: contain; margin-bottom: -30px; z-index: 2; }
  
  .modal-ratio-box {
    border: 1px solid rgba(255, 255, 255, 0.8); display: flex; justify-content: center; align-items: center;
    padding: 40px; box-sizing: border-box; text-align: center; max-width: 80vw; max-height: 60vh; margin-bottom: 40px;
  }
  .modal-point-text { font-size: 16px; line-height: 1.7; font-weight: 500; word-break: keep-all; margin: 0; }
  .modal-title { font-size: 42px; font-weight: 800; margin: 0 0 10px 0; text-transform: lowercase; }
  .modal-meta { font-size: 14px; font-weight: 600; opacity: 0.8; }
  .modal-meta span { margin: 0 10px; }

  .nav-btn { position: absolute; bottom: 40px; background: none; border: none; color: white; z-index: 3; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; text-decoration: none; }
  .nav-btn svg { width: 32px; height: 32px; margin-bottom: 8px; fill: currentColor; }
  .left-btn { left: 34px; } 
  .right-btn { right: 40px; } 
</style>
</head>
<body>

  <div id="coordTracker" class="coord-tracker">X: 000 | Y: 000</div>

  <div class="control-panel">
    <label for="toleranceSlider">TOLERANCE</label>
    <input type="range" id="toleranceSlider" min="1.0" max="1.5" step="0.05" value="1.25">
    <span id="tolValue" class="tol-value">25%</span>
  </div>

  <div id="detailModal" class="modal">
    <div id="modalTimerBg" class="modal-timer-bg"></div>
    <div id="modalMainContent" class="modal-main-content">
      <img id="modalImg" src="" alt="" class="modal-image" onerror="this.style.display='none'">
      <div id="modalRatioBox" class="modal-ratio-box">
        <p id="modalPoint" class="modal-point-text"></p>
      </div>
      <h1 id="modalTitle" class="modal-title"></h1>
      <div class="modal-meta">
        <span id="modalTime"></span>
        <span id="modalLevel"></span>
      </div>
      <a href="#" class="nav-btn right-btn" id="linkBtn" target="_blank">
        <svg viewBox="0 0 24 24"><path d="M19 19H5V5h7V3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/></svg>
        website
      </a>
    </div>
    <button class="nav-btn left-btn" id="homeBtn">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      home
    </button>
  </div>

<script>
  const foldingData = [
    { name: "장미", result: "장미", engName: "rose", paper: "햇반 껍질", ratio: 1.0, color: "#FF595E", time: "5 min", level: "lev. 3", point: "햇반 비닐 특유의 탄성을 이용해 꽃잎의 볼륨감을 살리는 것이 핵심입니다.", link: "#" },
    { name: "종이학", result: "종이학", engName: "paper crane", paper: "영수증", ratio: 1/1.14, color: "#FFCA3A", time: "2 min", level: "lev. 2", point: "영수증의 얇고 매끄러운 재질은 학의 날개를 펴기에 최적입니다.", link: "#" },
    { name: "딱지", result: "딱지", engName: "ttakji", paper: "껌띠지", ratio: 1/1.4, color: "#8AC926", time: "1 min", level: "lev. 1", point: "단단하게 맞물리도록 각을 살려 접는 것이 중요합니다.", link: "#" },
    { name: "종이비행기", result: "종이비행기", engName: "airplane", paper: "약봉투", ratio: 1/1.5, color: "#1982C4", time: "1 min", level: "lev. 1", point: "양쪽 날개의 대칭을 정확히 맞추세요.", link: "#" },
    { name: "종이배", result: "종이배", engName: "paper boat", paper: "명함", ratio: 1/1.6, color: "#6A4C93", time: "2 min", level: "lev. 2", point: "빳빳한 명함 재질이 배의 형태를 잘 잡아줍니다.", link: "#" },
    { name: "종이칼", result: "종이칼", engName: "paper knife", paper: "빵 봉투", ratio: 1/1.7, color: "#F15BB5", time: "3 min", level: "lev. 2", point: "손잡이 부분을 두껍게 접어 그립감을 만드세요.", link: "#" },
    { name: "원피스", result: "원피스", engName: "dress", paper: "티켓", ratio: 1/2.1, color: "#00BBF9", time: "4 min", level: "lev. 3", point: "치마의 주름을 입체적으로 표현하는 것이 포인트입니다.", link: "#" },
    { name: "모자", result: "모자", engName: "hat", paper: "껌 은박지", ratio: 1/2.5, color: "#00F5D4", time: "2 min", level: "lev. 2", point: "은박지의 구겨지는 성질을 이용해 질감을 살려보세요.", link: "#" },
    { name: "안경", result: "안경", engName: "glasses", paper: "영수증", ratio: 1/3, color: "#E36414", time: "2 min", level: "lev. 2", point: "테의 얇은 선을 살려 정교하게 접어주세요.", link: "#" },
    { name: "쪽지", result: "쪽지", engName: "secret note", paper: "과자 포장지", ratio: 1/3.5, color: "#0F4C5C", time: "1 min", level: "lev. 1", point: "풀리지 않게 끝부분을 꼼꼼히 끼워넣으세요.", link: "#" },
    { name: "오각상자", result: "오각상자", engName: "pentagon box", paper: "영수증", ratio: 1/5, color: "#5F0F40", time: "5 min", level: "lev. 4", point: "5개의 꼭짓점이 균일한 비율을 유지해야 합니다.", link: "#" },
    { name: "작은별", result: "작은별", engName: "small star", paper: "젓가락포장지", ratio: 1/6.3, color: "#333333", time: "3 min", level: "lev. 1", point: "젓가락을 잘 받쳐줄 수 있도록 각도를 조절하는 것이 핵심입니다. 반대편의 삼각형 모양이 접히는 방향에 집중하세요.", link: "https://instagram.com/tokkipooll" },
    { name: "스프링", result: "스프링", engName: "spring", paper: "빨대 비닐", ratio: 1/16, color: "#CB793A", time: "6 min", level: "lev. 4", point: "비닐을 나선형으로 꼬아 탄성을 극대화합니다.", link: "#" },
    { name: "편지하트", result: "편지하트", engName: "heart letter", paper: "영수증", ratio: 5/8, color: "#F1C40F", time: "2 min", level: "lev. 2", point: "하트의 곡선이 부드럽게 이어지도록 다듬어주세요.", link: "#" },
    { name: "모이주는새", result: "모이주는새", engName: "feeding bird", paper: "티백", ratio: 4/5, color: "#E67E22", time: "3 min", level: "lev. 3", point: "티백의 실을 꼬리로 활용하는 재치가 필요합니다.", link: "#" },
    { name: "돼지", result: "돼지", engName: "pig", paper: "영수증", ratio: 6/4, color: "#E74C3C", time: "4 min", level: "lev. 3", point: "통통한 볼륨감을 살리기 위해 바람을 살짝 불어넣으세요.", link: "#" },
    { name: "달러", result: "달러", engName: "dollar origami", paper: "지폐", ratio: 2/1, color: "#2ECC71", time: "4 min", level: "lev. 4", point: "지폐의 인물이나 문양이 돋보이게 접는 위치를 잘 맞춰주세요.", link: "#" }
  ];

  const normalizedData = foldingData.map(d => ({ ...d, norm: d.ratio >= 1 ? d.ratio : 1/d.ratio }));

  const slider = document.getElementById('toleranceSlider');
  const tolText = document.getElementById('tolValue');
  const coordTracker = document.getElementById('coordTracker');
  
  let isDragging = false;
  let startX, startY, currentX, currentY, currentBox, dimLabel;
  let lastDragWidth = 0, lastDragHeight = 0;
  let hideContentTimeout; 

  slider.oninput = (e) => { tolText.textContent = Math.round((parseFloat(e.target.value) - 1) * 100) + "%"; };

  document.addEventListener('mousemove', (e) => {
    coordTracker.textContent = `X: ${String(e.clientX).padStart(3, '0')} | Y: ${String(e.clientY).padStart(3, '0')}`;
  });

  document.onmousedown = (e) => {
    if (e.target.closest('.control-panel') || e.target.closest('.coord-tracker')) return;
    
    const clickedItem = e.target.closest('.matched-item');
    if (clickedItem) { 
      const itemName = clickedItem.getAttribute('data-name');
      const itemData = normalizedData.find(d => d.name === itemName);
      if(itemData) openModal(itemData, lastDragWidth, lastDragHeight); 
      return; 
    }

    const old = document.querySelector('.drag-box');
    if (old) old.remove();

    isDragging = true;
    startX = e.clientX; startY = e.clientY;
    
    currentBox = document.createElement('div');
    currentBox.className = 'drag-box';
    
    const content = document.createElement('div');
    content.className = 'suggestion-content';
    
    dimLabel = document.createElement('div');
    dimLabel.className = 'dimension-label';
    
    currentBox.appendChild(content);
    currentBox.appendChild(dimLabel);
    currentBox.style.left = startX + 'px'; currentBox.style.top = startY + 'px';
    document.body.appendChild(currentBox);
  };

  document.onmousemove = (e) => {
    if (!isDragging) return;
    currentX = e.clientX; currentY = e.clientY;
    lastDragWidth = Math.abs(currentX - startX);
    lastDragHeight = Math.abs(currentY - startY);
    currentBox.style.width = lastDragWidth + 'px';
    currentBox.style.height = lastDragHeight + 'px';
    currentBox.style.left = Math.min(currentX, startX) + 'px';
    currentBox.style.top = Math.min(currentY, startY) + 'px';
    
    if (lastDragWidth > 0 && lastDragHeight > 0) {
      const uRatio = Math.max(lastDragWidth, lastDragHeight) / Math.min(lastDragWidth, lastDragHeight);
      dimLabel.textContent = `W:${lastDragWidth} H:${lastDragHeight} (1:${uRatio.toFixed(2)})`;
    }
  };

  document.onmouseup = () => {
    if (!isDragging) return;
    isDragging = false;
    
    if (lastDragWidth > 25 && lastDragHeight > 25) {
      const uRatio = Math.max(lastDragWidth, lastDragHeight) / Math.min(lastDragWidth, lastDragHeight);
      const currentTolerance = parseFloat(slider.value);
      
      let matchedItems = [];
      normalizedData.forEach(d => {
        const diff = Math.max(uRatio / d.norm, d.norm / uRatio);
        if (diff <= currentTolerance) {
          matchedItems.push({ ...d, diff });
        }
      });

      if (matchedItems.length > 0) {
        matchedItems.sort((a, b) => a.diff - b.diff);

        currentBox.style.backgroundColor = 'rgba(255, 255, 255, 0.85)'; 
        
        let imagesHTML = '';
        matchedItems.forEach(item => {
          imagesHTML += `
            <div class="matched-item" data-name="${item.name}">
              <img src="${item.result}.png" alt="${item.name}" onerror="this.style.display='none'">
              <span class="matched-label">${item.engName || item.name}</span>
            </div>
          `;
        });

        currentBox.querySelector('.suggestion-content').innerHTML = imagesHTML;
        currentBox.classList.add('show-result');
      } else {
        currentBox.remove();
      }
    } else {
      currentBox.remove();
    }
  };

  function openModal(data, w, h) {
    const modal = document.getElementById('detailModal');
    const ratioBox = document.getElementById('modalRatioBox');
    const timerBg = document.getElementById('modalTimerBg');
    const mainContent = document.getElementById('modalMainContent');
    
    timerBg.style.transition = 'none'; 
    timerBg.style.width = '100%';      
    timerBg.style.backgroundColor = data.color;
    mainContent.style.opacity = '1';   
    
    ratioBox.style.aspectRatio = `${w} / ${h}`;
    if (w > h) { ratioBox.style.width = "500px"; ratioBox.style.height = "auto"; }
    else { ratioBox.style.height = "400px"; ratioBox.style.width = "auto"; }

    document.getElementById('modalImg').src = `${data.result}.png`;
    document.getElementById('modalPoint').textContent = data.point;
    document.getElementById('modalTitle').textContent = data.engName || data.name;
    document.getElementById('modalTime').textContent = data.time;
    document.getElementById('modalLevel').textContent = data.level;
    document.getElementById('linkBtn').href = data.link || "#";

    modal.classList.add('active');

    const minutes = parseInt(data.time) || 1; 
    const durationMs = minutes * 60000; 
    
    void timerBg.offsetWidth; 
    timerBg.style.transition = `width ${durationMs}ms linear`;
    timerBg.style.width = '100px'; 
    
    clearTimeout(hideContentTimeout);
    hideContentTimeout = setTimeout(() => { mainContent.style.opacity = '0'; }, durationMs);
  }

  document.getElementById('homeBtn').onclick = () => { 
    clearTimeout(hideContentTimeout);
    document.getElementById('detailModal').classList.remove('active'); 
  };
</script>

</body>
</html>
</html>
