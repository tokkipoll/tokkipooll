<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Archive - Data Fix</title>
<style>
    /* --- 디자인 스타일 유지 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    body { background: #fdfdfd; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    #dragBox { position:absolute; border:1px solid #00ff00; background: rgba(0, 255, 0, 0.02); display:none; pointer-events:none; z-index:1000; }
    #ratioTag { position:absolute; top:-22px; left:0; background:#00ff00; color:#000; font-size:10px; font-weight:bold; padding:2px 6px; }

    .traceBox { position:absolute; border:1px solid #000; background: #fff; z-index: 50; display: flex; flex-direction: column; }
    .box-header { height: 18px; border-bottom: 1px solid #000; display: flex; align-items: center; justify-content: space-between; padding: 0 8px; font-size: 8px; background: #fafafa; }
    .image-list { flex: 1; display: flex; overflow-x: auto; padding: 10px; gap: 15px; align-items: center; }
    .image-list::-webkit-scrollbar { height: 2px; }
    .image-list::-webkit-scrollbar-thumb { background: #00ff00; }
    .item-wrapper { height: 100%; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
    .result-img { height: calc(100% - 15px); width: auto; object-fit: contain; border: 0.5px solid #eee; }
    .item-name { font-size: 8px; margin-top: 5px; color: #888; text-transform: uppercase; }

    #detailView { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #fff; display: none; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
    #detailBgImg { position: absolute; max-width: 60vw; max-height: 60vh; opacity: 0.15; z-index: -1; filter: grayscale(1); object-fit: contain; pointer-events: none; }
    
    #detailName { font-size: 28px; font-weight: normal; margin-bottom: 30px; text-decoration: underline; letter-spacing: 2px; cursor: pointer; transition: color 0.2s; z-index: 10; }
    #detailName:hover { color: #00ff00; }

    #detailPointBox { 
        border: 1px solid #000; padding: 40px; 
        display: flex; align-items: center; justify-content: center; 
        text-align: center; font-size: 14px; line-height: 1.8; 
        background: rgba(255, 255, 255, 0.8); 
        transition: width 0.5s, height 0.5s; 
        overflow-y: auto; 
        min-width: 320px; min-height: 200px;
        max-width: 85vw; max-height: 65vh;
    }

    #detailMeta { margin-top: 30px; font-size: 11px; color: #000; letter-spacing: 3px; text-transform: uppercase; text-align: center; }
    #closeDetail { position: absolute; top: 40px; right: 40px; font-size: 12px; cursor: pointer; border-bottom: 1px solid #000; z-index: 100; }

    #panel { position:fixed; left:30px; bottom:30px; width:220px; background:#fff; padding:25px; border:1px solid #000; z-index:3000; }
    #panel h1 { font-size:14px; margin-bottom:15px; letter-spacing: 1px; }
    .lang-switcher { position: absolute; top: 25px; right: 25px; font-size: 10px; cursor: pointer; border-bottom: 1px solid #000; padding-bottom: 2px; }
    #status { font-size:9px; color: #888; margin-bottom: 10px; }
    #tol { width:100%; margin:15px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; background:#00ff00; border:1px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">1:1.00</div></div>
</div>

<div id="detailView">
    <div id="closeDetail" onclick="closeDetail()">CLOSE</div>
    <div id="detailName" onclick="goToLink()"></div>
    <img id="detailBgImg" src="">
    <div id="detailPointBox" onclick="event.stopPropagation()"></div>
    <div id="detailMeta">
        <span id="detailTime"></span> • <span id="detailLevel"></span>
    </div>
</div>

<div id="panel">
    <div class="lang-switcher" onclick="toggleLang()">EN / KR</div>
    <h1 id="ui-title">Archive.sys</h1>
    <div id="status">CONNECTING...</div>
    <label style="font-size: 10px;"><span id="ui-tol">TOLERANCE</span>: <span id="tolText">30%</span></label>
    <input type="range" min="1" max="100" value="30" id="tol">
</div>

<script>
let currentLang = 'KR';
let currentActiveItem = null;

const translations = {
    KR: { title: "기록.sys", tol: "오차 범위", indexed: "개 항목 연결됨", close: "닫기" },
    EN: { title: "Archive.sys", tol: "TOLERANCE", indexed: "ITEMS INDEXED", close: "CLOSE" }
};

const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

// [핵심] CSV의 쉼표 문제를 해결하는 정교한 파싱 함수
function parseCSV(text) {
    const rows = [];
    const lines = text.split(/\r?\n/);
    lines.forEach(line => {
        // 큰따옴표 안의 쉼표는 무시하고 나누는 정규표현식
        const matches = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g);
        if (matches) {
            rows.push(matches.map(val => val.replace(/^"|"$/g, "").trim()));
        }
    });
    return rows;
}

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = parseCSV(csvText); // 보강된 파서 사용
        const headers = rows[0].map(h => h.toLowerCase());
        
        const idx = {
            name: headers.indexOf('name'),
            name_en: headers.indexOf('name_en'),
            image: headers.indexOf('image'),
            ratio: headers.indexOf('ratio'),
            point: headers.indexOf('point'),
            point_en: headers.indexOf('point_en'),
            level: headers.indexOf('level'),
            time: headers.indexOf('time'),
            link: headers.indexOf('link')
        };

        db = rows.slice(1).map(row => {
            let rVal = parseFloat(row[idx.ratio]);
            return {
                name_kr: row[idx.name],
                name_en: (idx.name_en !== -1 && row[idx.name_en]) ? row[idx.name_en] : row[idx.name],
                image: row[idx.image],
                point_kr: row[idx.point],
                point_en: (idx.point_en !== -1 && row[idx.point_en]) ? row[idx.point_en] : row[idx.point],
                level: row[idx.level],
                time: row[idx.time],
                ratio: rVal,
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal,
                link: row[idx.link] || ""
            };
        }).filter(item => !isNaN(item.normRatio) && item.image);
        updateUI();
    } catch (e) { document.getElementById("status").innerHTML = `ERROR`; }
}
init();

function toggleLang() {
    currentLang = (currentLang === 'KR') ? 'EN' : 'KR';
    updateUI();
    if (currentActiveItem) refreshDetailContent();
}

function updateUI() {
    const t = translations[currentLang];
    document.getElementById("ui-title").innerText = t.title;
    document.getElementById("ui-tol").innerText = t.tol;
    document.getElementById("status").innerHTML = `${db.length} ${t.indexed}`;
    document.getElementById("closeDetail").innerText = t.close;
}

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

document.getElementById("tol").addEventListener("input", (e) => { 
    document.getElementById("tolText").innerText = e.target.value + "%"; 
});

stage.addEventListener("mousedown", (e) => {
    if(e.target !== stage) return;
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});
stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `R: 1:${currentR.toFixed(2)}`;
});
stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 25 || h < 25) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));

    if (results.length > 0) {
        let itemsHTML = results.map(item => `
            <div class="item-wrapper" onclick="event.stopPropagation(); openDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                <img src="${ASSET_PATH + item.image}" class="result-img">
                <span class="item-name">${currentLang === 'KR' ? item.name_kr : item.name_en}</span>
            </div>
        `).join('');

        box.innerHTML = `
            <div class="box-header"><span>RATIO: 1:${userRatio.toFixed(1)}</span><span>COUNT: ${results.length}</span></div>
            <div class="image-list">${itemsHTML}</div>
        `;
    }
}

function openDetail(encoded) {
    currentActiveItem = JSON.parse(decodeURIComponent(atob(encoded)));
    refreshDetailContent();
    document.getElementById("detailView").style.display = "flex";
}

function refreshDetailContent() {
    const item = currentActiveItem;
    const name = currentLang === 'KR' ? item.name_kr : item.name_en;
    const point = currentLang === 'KR' ? item.point_kr : item.point_en;

    const nameEl = document.getElementById("detailName");
    nameEl.innerText = name;
    
    if(item.link && item.link.startsWith('http')) {
        nameEl.style.textDecoration = "underline";
        nameEl.style.cursor = "pointer";
    } else {
        nameEl.style.textDecoration = "none";
        nameEl.style.cursor = "default";
    }

    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;
    document.getElementById("detailPointBox").innerText = point;

    // 박스 크기 계산
    const baseSize = 400;
    const r = item.ratio || 1;
    let targetW, targetH;
    if (r >= 1) { targetW = baseSize; targetH = baseSize / r; } 
    else { targetH = baseSize; targetW = baseSize * r; }
    
    document.getElementById("detailPointBox").style.width = Math.max(targetW, 320) + "px";
    document.getElementById("detailPointBox").style.height = Math.max(targetH, 200) + "px";

    // 시간과 레벨 정확히 매칭
    const timeText = (item.time || "0 MIN").toUpperCase();
    const levelText = (item.level || "LEV.1").toUpperCase();
    
    let displayTime = timeText;
    let displayLevel = levelText;

    if(currentLang === 'EN') {
        displayTime = displayTime.replace("분", " MIN");
        displayLevel = displayLevel.replace("보통", "NORMAL").replace("쉬움", "EASY").replace("어려움", "HARD");
    }

    document.getElementById("detailTime").innerText = displayTime;
    document.getElementById("detailLevel").innerText = displayLevel.includes('LEV') ? displayLevel : `LEV.${displayLevel}`;
}

function goToLink() {
    if (currentActiveItem && currentActiveItem.link && currentActiveItem.link.startsWith('http')) {
        window.open(currentActiveItem.link, '_blank');
    }
}

function closeDetail() {
    document.getElementById("detailView").style.display = "none";
    currentActiveItem = null;
}

window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
