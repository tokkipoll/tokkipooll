<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Ratio Search</title>
<style>
    /* 기본 스타일 및 직각 디자인 */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    body { background:#ececec; font-family: sans-serif; overflow:hidden; }
    
    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }
    
    /* 드래그 박스 */
    #dragBox { 
        position:absolute; border:2px solid #000; background:rgba(255,255,255,0.5);
        display:none; pointer-events:none; z-index:100; 
    }
    #ratioTag { position:absolute; top:-26px; left:0; background:#000; color:#fff; font-size:12px; font-weight:bold; padding:4px 8px; white-space:nowrap; }

    /* 결과 박스 (하얀색 불투명) */
    .traceBox { 
        position:absolute; border:2px solid #000; background:#ffffff; 
        overflow-y: auto; display: flex; flex-wrap: wrap; padding: 10px; gap: 10px; z-index: 50;
    }
    .traceBox img { width: 60px; height: 60px; object-fit: contain; cursor: pointer; border: 1px solid #eee; }
    .traceBox img:hover { border-color: #000; }

    /* 상세 모달 창 (요청하신 디자인) */
    #detailView {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #fff; display: none; z-index: 1000;
        flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer;
    }
    #detailBgImg {
        position: absolute; width: 400px; opacity: 0.2; z-index: -1;
        top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    #detailPointBox {
        border: 1px solid #000; padding: 30px; max-width: 600px;
        text-align: center; font-size: 18px; font-weight: bold; line-height: 1.4;
        margin-bottom: 20px; background: rgba(255,255,255,0.8);
    }
    #detailName { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
    #detailMeta { font-size: 18px; color: #333; }
    #detailMeta span { margin: 0 15px; }

    #panel { 
        position:fixed; left:18px; bottom:18px; width:280px; 
        background:#fff; padding:20px; border:2px solid #000; 
        box-shadow:5px 5px 0px rgba(0,0,0,0.1); z-index:200; 
    }
    #status { font-size:11px; margin-bottom:10px; padding:6px; background:#f0f0f0; border:1px solid #ccc; }
    #tol { width:100%; margin:12px 0; -webkit-appearance:none; background:#ccc; height:8px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:18px; height:18px; background:#000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">Ratio 1 : 1.00</div></div>
</div>

<div id="detailView">
    <img id="detailBgImg" src="" alt="bg">
    <div id="detailPointBox">설명이 들어가는 자리입니다.</div>
    <div id="detailName">항목 이름</div>
    <div id="detailMeta">
        <span id="detailTime">0 min</span>
        <span id="detailLevel">lev. 0</span>
    </div>
</div>

<div id="panel">
    <h1>Origami Ratio Search</h1>
    <div id="status">데이터 연결 중...</div>
    <label>Tolerance: <span id="tolText">50%</span></label>
    <input type="range" min="1" max="100" value="50" id="tol">
</div>

<script>
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const lines = csvText.split("\n");
        const headers = lines[0].split(",").map(h => h.trim().toLowerCase());
        
        // 인덱스 찾기
        const idx = {
            name: headers.indexOf('name'),
            image: headers.indexOf('image'),
            ratio: headers.indexOf('ratio'),
            point: headers.indexOf('point'),
            level: headers.indexOf('level'),
            time: headers.indexOf('time')
        };

        db = lines.slice(1).map(line => {
            const col = line.split(",");
            let rRaw = col[idx.ratio];
            let rVal = parseFloat(rRaw);
            if (rRaw && rRaw.includes(':')) {
                const parts = rRaw.split(':');
                rVal = parseFloat(parts[parts.length - 1]) / parseFloat(parts[0] || 1);
            }
            return {
                name: col[idx.name],
                image: col[idx.image]?.trim(),
                point: col[idx.point],
                level: col[idx.level],
                time: col[idx.time],
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal
            };
        }).filter(item => !isNaN(item.normRatio));

        document.getElementById("status").innerHTML = `✅ 연결 성공: <b>${db.length}개</b>`;
    } catch (e) {
        document.getElementById("status").innerHTML = `❌ 연결 실패`;
    }
}
init();

// 드래그 로직 (기존과 동일)
const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

stage.addEventListener("mousedown", (e) => {
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});
stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `Ratio 1 : ${currentR.toFixed(2)}`;
});
stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 20 || h < 20) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tVal = Number(document.getElementById("tol").value) / 100;
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tVal));

    if (results.length === 0) {
        box.innerHTML = `<span style="font-size:11px; color:#999;">일치 없음</span>`;
    } else {
        results.forEach(item => {
            const img = document.createElement("img");
            img.src = ASSET_PATH + item.image;
            // 이미지 클릭 시 상세 정보 보기
            img.onclick = () => showDetail(item);
            img.onload = () => box.appendChild(img);
        });
    }
}

// 상세 정보 보여주기 함수
function showDetail(item) {
    const detailView = document.getElementById("detailView");
    document.getElementById("detailBgImg").src = ASSET_PATH + item.image;
    document.getElementById("detailPointBox").innerText = item.point || "설명이 없습니다.";
    document.getElementById("detailName").innerText = item.name;
    document.getElementById("detailTime").innerText = item.time || "0 min";
    document.getElementById("detailLevel").innerText = "lev. " + (item.level || "0");
    
    detailView.style.display = "flex";
}

// 상세 화면 닫기
document.getElementById("detailView").onclick = function() {
    this.style.display = "none";
};

// 스페이스바 초기화
window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
