<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ORIGAMI ARCHIVE.V1</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />

<style>
    /* 폰트 정의 */
    @font-face { font-family: 'Savate'; src: url('fonts/Savate.woff2') format('woff2'); font-weight: normal; font-style: normal; }

    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    
    body { 
        background: #ffffff; 
        background-image: linear-gradient(#fff4f4 1px, transparent 1px), linear-gradient(90deg, #fff4f4 1px, transparent 1px);
        background-size: 20px 20px;
        font-family: 'Pretendard', sans-serif; 
        overflow: hidden; 
        color: #000;
        touch-action: none;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; z-index: 10; }

    /* 타이틀 및 패널 폰트 적용 */
    #guide-left, #ui-title, #detailName { font-family: 'Savate', sans-serif; }

    #dragBox { position:absolute; border:1px solid #ffffff; background: rgba(0, 0, 0, 0.05); display:none; pointer-events:none; z-index:1000; }
    #ratioTag { position:absolute; top:-25px; left:0; background:#000000; color:#fff; font-size:10px; font-weight:600; padding:2px 6px; white-space: nowrap; font-family: 'Space Mono', monospace; }

    .resultContainer { position:absolute; z-index: 50; mix-blend-mode: multiply; }
    .scattered-img { position: absolute; object-fit: contain; cursor: grab; z-index: 51; filter: grayscale(0.2) contrast(1.1); }

    /* 상세 화면 */
    #detailView { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000000; display: none; z-index: 6000; flex-direction: column; align-items: center; justify-content: center; color: #ffffff; }
    #detailName { font-size: 60px; margin-bottom: 20px; cursor: pointer; color: #ffffff; text-transform: uppercase; }
    #detailPointBox { border: 1px solid #ffffff; padding: 25px; text-align: center; font-size: 14px; background: rgba(255, 255, 255, 0.05); z-index: 5; max-width: 90vw; backdrop-filter: blur(2px); color: #ffffff; }
    
    /* 패널 레이아웃 변경 (테두리 완전히 제거) */
    #panel { 
        position:fixed; left:0; bottom:0; width:300px; padding:20px; 
        background:#ffffff; z-index:3000; 
    }
    #ui-title { font-size: 24px; text-transform: uppercase; margin-bottom: 10px; }
    #status { font-family: 'Space Mono', monospace; font-size: 9px; color: #888; margin-bottom: 20px; }
</style>
</head>
<body>

<div id="guide-left">drag to define ratio</div>
<div id="coords">x: 0000, y: 0000</div>
<div id="stage"><div id="dragBox"><div id="ratioTag">1:1.00</div></div></div>

<div id="detailView">
    <div id="closeDetail" onclick="closeDetail()" style="position: absolute; top: 25px; right: 25px; cursor: pointer; border-bottom: 1px solid #fff;">CLOSE</div>
    <div id="detailName" onclick="goToLink()"></div>
    <img id="detailBgImg" src="" onerror="this.style.display='none'" style="position: absolute; opacity: 0.1; max-width: 50vw;">
    <div id="detailPointBox" onclick="event.stopPropagation()"></div>
</div>

<div id="panel">
    <h1 id="ui-title">ORIGAMI ARCHIVE.V1</h1>
    <div id="status">SYNCED WITH GOOGLE SHEETS</div>
    <div class="lang-switcher" onclick="toggleLang()" style="cursor:pointer; border-bottom:1px solid #000; display:inline-block;">EN / KR</div>
    <div style="margin-top:20px;">
        <label style="font-size: 11px; font-weight: 600;">TOLERANCE</label>
        <input type="range" min="1" max="100" value="30" id="tol" style="width:100%; margin:8px 0; accent-color:#ff4479;">
    </div>
</div>

<script>
let currentLang = 'KR', currentActiveItem = null, db = [], isDown = false, startX, startY, draggedImg, offX, offY;
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&t=${new Date().getTime()}`;
const ASSET_PATH = "foldingpapers/assets/"; 
const colorPalette = ['rgba(235, 87, 87, 0.8)', 'rgba(242, 153, 74, 0.8)', 'rgba(242, 201, 76, 0.8)', 'rgba(39, 174, 96, 0.8)', 'rgba(45, 156, 219, 0.8)', 'rgba(155, 89, 182, 0.8)'];

document.addEventListener('mousedown', (e) => { if(e.target.classList.contains('scattered-img')) { draggedImg = e.target; offX = e.clientX - draggedImg.offsetLeft; offY = e.clientY - draggedImg.offsetTop; } });
document.addEventListener('mousemove', (e) => { if(draggedImg) { draggedImg.style.left = (e.clientX - offX) + 'px'; draggedImg.style.top = (e.clientY - offY) + 'px'; } });
document.addEventListener('mouseup', () => draggedImg = null);

function handleStart(e) { if(e.target !== stage) return; isDown = true; const pos = e.touches ? e.touches[0] : e; startX = pos.clientX; startY = pos.clientY; dragBox.style.display = "block"; dragBox.style.width = "0px"; dragBox.style.height = "0px"; }
function handleMove(e) { if(!isDown) return; const pos = e.touches ? e.touches[0] : e; const w = Math.abs(pos.clientX - startX), h = Math.abs(pos.clientY - startY); dragBox.style.width = w + "px"; dragBox.style.height = h + "px"; dragBox.style.left = Math.min(pos.clientX, startX) + "px"; dragBox.style.top = Math.min(pos.clientY, startY) + "px"; document.getElementById("ratioTag").innerHTML = `ratio 1:${(w>h?w/h:h/w).toFixed(2)}`; document.getElementById('coords').innerText = `x: ${String(Math.round(pos.clientX)).padStart(4, '0')}, y: ${String(Math.round(pos.clientY)).padStart(4, '0')}`; }
function handleEnd(e) { if(!isDown) return; isDown = false; const w = parseInt(dragBox.style.width), h = parseInt(dragBox.style.height), l = parseInt(dragBox.style.left), t = parseInt(dragBox.style.top); dragBox.style.display = "none"; if(w < 20 || h < 20) return; createResultBox(l, t, w, h, w > h ? (w/h) : (h/w)); }

stage.addEventListener("mousedown", handleStart);
window.addEventListener("mousemove", handleMove);
window.addEventListener("mouseup", handleEnd);

function parseCSV(text) {
    const result = []; let row = []; let field = ""; let inQuotes = false;
    for (let i = 0; i < text.length; i++) {
        const char = text[i]; const nextChar = text[i + 1];
        if (inQuotes) { if (char === '"' && nextChar === '"') { field += '"'; i++; } else if (char === '"') { inQuotes = false; } else { field += char; } }
        else { if (char === '"') { inQuotes = true; } else if (char === ',') { row.push(field); field = ""; } else if (char === '\n' || char === '\r') { if (field || row.length > 0) { row.push(field); result.push(row); field = ""; row = []; } if (char === '\r' && nextChar === '\n') i++; } else { field += char; } }
    }
    if (field || row.length > 0) { row.push(field); result.push(row); }
    return result;
}

function createResultBox(x, y, w, h, userRatio) {
    let results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * 0.3));
    if (results.length > 0) {
        const box = document.createElement("div"); box.className = "resultContainer"; box.style.backgroundColor = colorPalette[Math.floor(Math.random() * colorPalette.length)]; Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' }); stage.appendChild(box);
        results.forEach(item => {
            const img = document.createElement("img"); img.src = ASSET_PATH + item.image; img.className = "scattered-img"; const size = Math.min(Math.min(w, h) * 0.3, 100); img.style.width = size + 'px'; img.style.left = (x + Math.random() * (w - size)) + 'px'; img.style.top = (y + Math.random() * (h - size)) + 'px'; img.onclick = (e) => { e.stopPropagation(); currentActiveItem = item; document.getElementById("detailView").style.display = "flex"; document.getElementById("detailName").innerText = item.name; document.getElementById("detailPointBox").innerText = item.point_kr; document.getElementById("detailBgImg").src = ASSET_PATH + item.image; }; stage.appendChild(img);
        });
    }
}
async function init() {
    const r = await fetch(CSV_URL); const t = await r.text(); const rows = parseCSV(t);
    db = rows.slice(1).map(r => ({ name: r[0], image: r[1], ratio: parseFloat(r[2]), normRatio: parseFloat(r[2]) < 1 ? 1/parseFloat(r[2]) : parseFloat(r[2]), point_kr: r[3] })).filter(i => i.image);
}
init();
function closeDetail() { document.getElementById("detailView").style.display = "none"; }
function toggleLang() { /* 언어 전환 로직 */ }
function goToLink() { /* 링크 이동 로직 */ }
window.addEventListener("keydown", (e) => { if(e.code === "Space") { document.querySelectorAll(".resultContainer").forEach(el => el.remove()); document.querySelectorAll(".scattered-img").forEach(el => el.remove()); } });
</script>
</body>
</html>
