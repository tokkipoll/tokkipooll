<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGAMI ARCHIVE.V1</title>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    
    body { 
        background-color: #f7f6f2; 
        background-image: linear-gradient(#e0deda 0.5px, transparent 0.5px), linear-gradient(90deg, #e0deda 0.5px, transparent 0.5px);
        background-size: 20px 20px;
        /* 타자기체 적용 */
        font-family: 'Courier Prime', monospace; 
        color: #2c2c2c;
        overflow: hidden;
    }

    .traceBox {
        mix-blend-mode: multiply; 
        position:absolute;
        pointer-events: none;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    #ui-title { 
        position: fixed; top: 30px; left: 30px; 
        font-size: 40px; font-weight: 700; line-height: 0.9;
        text-transform: uppercase;
        z-index: 100;
        pointer-events: none;
    }

    #panel { 
        position:fixed; left:30px; bottom:30px; width:280px;
        z-index:3000;
        background: rgba(247, 246, 242, 0.8);
        padding: 10px;
        border: 1px solid #ccc;
    }

    #tol { width:100%; margin-top:10px; accent-color: #000; height: 2px; }
</style>
</head>
<body>

<h1 id="ui-title">ORIGAMI<br>ARCHIVE</h1>

<div id="stage"></div>

<div id="panel">
    <label style="font-size: 11px; font-weight: 700;">TOLERANCE / ADJUST</label>
    <input type="range" min="1" max="100" value="30" id="tol">
</div>

<script>
    const stage = document.getElementById("stage");
    let isDown = false;
    let startX, startY;

    // 사진 속의 다채로운 컬러 팔레트 구성
    const colors = [
        'rgba(255, 50, 100, 0.5)',  // 핑크
        'rgba(255, 120, 0, 0.5)',   // 오렌지
        'rgba(220, 220, 0, 0.5)',   // 옐로우
        'rgba(50, 180, 50, 0.5)',   // 그린
        'rgba(0, 120, 220, 0.5)'    // 블루
    ];

    stage.addEventListener("mousedown", (e) => {
        isDown = true;
        startX = e.clientX; startY = e.clientY;
    });

    stage.addEventListener("mouseup", (e) => {
        if(!isDown) return;
        isDown = false;
        
        const w = Math.abs(e.clientX - startX);
        const h = Math.abs(e.clientY - startY);
        if(w < 20 || h < 20) return;

        const box = document.createElement("div");
        box.className = "traceBox";
        
        // 랜덤 컬러 적용
        const randomColor = colors[Math.floor(Math.random() * colors.length)];

        Object.assign(box.style, {
            left: Math.min(e.clientX, startX) + 'px',
            top: Math.min(e.clientY, startY) + 'px',
            width: w + 'px',
            height: h + 'px',
            background: randomColor
        });
        stage.appendChild(box);
    });
</script>
</body>
</html>
