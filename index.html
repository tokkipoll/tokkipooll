<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Origami Ratio Search</title>

<style>
/* --- 기초 스타일 (완전 직각 디자인) --- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    border-radius: 0 !important; 
}

body{
    background:#ececec;
    font-family: Arial, sans-serif;
    overflow:hidden;
}

#stage{
    position:relative;
    width:100vw;
    height:100vh;
    cursor:crosshair;
}

#dragBox{
    position:absolute;
    border:2px solid #000;
    background:rgba(0,0,0,0.03);
    display:none;
    pointer-events:none;
    z-index: 100;
}

#ratioTag{
    position:absolute;
    top:-26px;
    left:0;
    background:#000;
    color:#fff;
    font-size:12px;
    font-weight: bold;
    padding:4px 8px;
    white-space:nowrap;
}

.traceBox{
    position:absolute;
    border:1px solid rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.3);
    overflow:hidden;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* 결과 없음 텍스트 */
.no-result {
    font-size: 10px;
    color: #999;
    text-align: center;
}

.traceBox img{
    position:absolute;
    max-width:80px;
    max-height:80px;
    object-fit:contain;
    pointer-events:none;
}

#panel{
    position:fixed;
    left:18px;
    bottom:18px;
    width:260px;
    background:#fff;
    padding:20px;
    border:2px solid #000;
    box-shadow: 5px 5px 0px rgba(0,0,0,0.1);
    z-index: 200;
}

#panel h1{
    font-size:16px;
    margin-bottom:12px;
    border-bottom: 2px solid #000;
    padding-bottom: 8px;
}

#tol{
    width:100%;
    margin: 12px 0;
    cursor: pointer;
    -webkit-appearance: none;
    background: #ccc;
    height: 8px;
}

#tol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #000;
}
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox">
        <div id="ratioTag">1 : 1.00</div>
    </div>
</div>

<div id="panel">
    <h1>Origami Ratio Search</h1>
    <label>Tolerance: <span id="tolText">50%</span></label>
    <input type="range" min="1" max="100" value="50" id="tol">
    <div id="small" style="font-size:11px; margin-top:10px;">
        • 드래그하면 비율에 맞는 항목이 뜹니다.<br>
        • 안 뜰 경우 Tolerance를 높여보세요.
    </div>
</div>

<script>
const SHEET_URL = "https://opensheet.elk.sh/1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60/Sheet1";
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");
const ratioTag = document.getElementById("ratioTag");
const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");

// 데이터 로드
fetch(SHEET_URL).then(r => r.json()).then(data => {
    db = data.map(item => {
        let rVal = item.ratio;
        if (typeof rVal === 'string' && rVal.includes(':')) {
            const p = rVal.split(':');
            rVal = parseFloat(p[0]) / parseFloat(p[1]);
        } else {
            rVal = parseFloat(rVal);
        }
        return { ...item, parsedRatio: rVal };
    });
    console.log("데이터 로드 성공:", db);
});

tol.addEventListener("input", () => { tolText.innerText = tol.value + "%"; });

stage.addEventListener("mousedown", (e) => {
    isDown = true;
    startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});

stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px";
    dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px";
    dragBox.style.top = Math.min(e.clientY, startY) + "px";
    
    // 화면에 보여줄 때는 가로/세로 중 큰 값을 작은 값으로 나눈 비율 표시
    const displayRatio = w > h ? (w/h) : (h/w);
    ratioTag.innerHTML = `1 : ${displayRatio.toFixed(2)}`;
});

stage.addEventListener("mouseup", (e) => {
    if(!isDown) return;
    isDown = false;
    dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);
    if(w < 10 || h < 10) return;

    // 핵심: 가로가 길든 세로가 길든 "긴 변 / 짧은 변" 비율로 검색
    const userRatio = w > h ? (w/h) : (h/w);
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, userRatio);
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tVal = Number(tol.value) / 100;
    
    // 필터링 (가로세로 비율 대응)
    let results = db.filter(item => {
        const r = item.parsedRatio;
        if (isNaN(r)) return false;
        // 시트의 비율 r과 사용자의 비율 userRatio 비교
        return Math.abs(r - userRatio) <= (userRatio * tVal) || 
               Math.abs((1/r) - userRatio) <= (userRatio * tVal);
    });

    if (results.length === 0) {
        box.innerHTML = '<span class="no-result">일치 항목 없음</span>';
    } else {
        results.slice(0, 5).forEach(item => {
            const img = document.createElement("img");
            img.src = ASSET_PATH + item.image.trim();
            img.onload = () => {
                const size = Math.min(w, h, 30 + Math.random() * 50);
                Object.assign(img.style, {
                    width: size + "px",
                    left: Math.random() * (w - size) + "px",
                    top: Math.random() * (h - size) + "px",
                    transform: `rotate(${Math.random() * 20 - 10}deg)`
                });
                box.appendChild(img);
            };
        });
    }
    
    const all = document.querySelectorAll(".traceBox");
    if(all.length > 10) all[0].remove();
}

window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
