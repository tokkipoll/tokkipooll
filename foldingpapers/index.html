<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tokkipooll - Minimalist Blueprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF5E3E;
            --bg-color: #FFFEFC;
            --text-main: #4D4D4D;
            --font-main: 'Roboto', sans-serif;
        }

        body {
            margin: 0; padding: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden; user-select: none; cursor: crosshair;
            font-family: var(--font-main);
            -webkit-font-smoothing: antialiased;
            color: var(--text-main);
        }

        /* 컨트롤 및 트래커 */
        .coord-tracker { position: fixed; top: 25px; right: 30px; font-size: 11px; font-weight: 500; opacity: 0.6; }
        .control-panel { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); 
            z-index: 2000; display: flex; align-items: center; gap: 15px;
        }
        .tol-value { font-size: 12px; color: var(--primary-color); font-weight: 700; width: 35px; }

        input[type="range"] { -webkit-appearance: none; width: 100px; background: transparent; cursor: pointer; }
        input[type="range"]::-webkit-slider-runnable-track { width: 100%; height: 1px; background: #ddd; }
        input[type="range"]::-webkit-slider-thumb { 
            -webkit-appearance: none; width: 4px; height: 12px;
            background: var(--text-main); margin-top: -5.5px; border-radius: 0; 
        }

        /* 드래그 영역: 평면 위의 '틈' */
        .drag-box { position: absolute; border: 1px solid var(--primary-color); box-sizing: border-box; z-index: 10; pointer-events: none; }
        .drag-box.show-result { border: 1px solid #000; background-color: rgba(255, 255, 255, 0.98); pointer-events: auto; }
        .dimension-label { 
            position: absolute; bottom: -22px; right: 0; 
            font-size: 9px; font-weight: 500; color: white; 
            background-color: var(--primary-color); padding: 2px 6px;
        }

        /* 텍스트 중심 결과창 */
        .suggestion-content { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; padding: 15px; box-sizing: border-box; }
        .matched-item { cursor: pointer; text-align: center; }
        .matched-label { font-size: 11px; font-weight: 500; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 2px; }

        /* 모달: 몰입의 시간 */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: var(--bg-color); z-index: 1000; opacity: 0; pointer-events: none; transition: 0.4s ease;
        }
        .modal.active { opacity: 1; pointer-events: auto; }

        .modal-main-content {
            position: relative; width: 100%; height: 100%;
            padding: 60px 60px; box-sizing: border-box;
            display: flex; flex-direction: column; align-items: flex-start;
        }

        .modal-title { font-size: 32px; font-weight: 500; margin: 0 0 8px 0; letter-spacing: -0.03em; }
        .modal-info-row { display: flex; gap: 40px; margin-bottom: 25px; }
        .info-item { font-size: 11px; font-weight: 700; }
        .modal-point-text { font-size: 13px; line-height: 1.7; max-width: 350px; margin: 0; font-weight: 400; }

        /* 타이머 시각화: 수축하는 사각형 */
        .visual-box-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
            width: 300px; height: 60px;
            display: flex; align-items: center; justify-content: center;
        }
        .visual-box {
            background-color: var(--primary-color);
            width: 100%; height: 100%;
            transform: scaleX(1) scaleY(1);
            opacity: 1;
            /* transform-origin을 중앙으로 설정하여 양옆에서 좁혀지게 함 */
            transform-origin: center; 
        }

        /* 하단 푸터 */
        .footer-group {
            position: absolute; bottom: 35px; left: 40px; right: 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .footer-left { display: flex; align-items: center; gap: 15px; }
        .page-dot { font-size: 24px; color: #E8E8E8; font-weight: 900; letter-spacing: -2px; }
        .nav-btn { background: none; border: none; cursor: pointer; color: #D1D1D1; padding: 0; }
        .nav-btn svg { width: 22px; height: 22px; fill: currentColor; }

    </style>
</head>
<body>

<div id="coordTracker" class="coord-tracker">000 : 000</div>

<div class="control-panel">
    <label style="font-size: 10px; font-weight: 700;">TOLERANCE</label>
    <input type="range" id="toleranceSlider" min="1.0" max="1.5" step="0.01" value="1.25">
    <span id="tolValue" class="tol-value">25%</span>
</div>

<div id="detailModal" class="modal">
    <div class="modal-main-content">
        <h1 id="modalTitle" class="modal-title"></h1>
        <div class="modal-info-row">
            <span id="modalTime" class="info-item"></span>
            <span id="modalLevel" class="info-item"></span>
        </div>
        <p id="modalPoint" class="modal-point-text"></p>
        
        <div class="visual-box-container">
            <div id="timeVisual" class="visual-box"></div>
        </div>

        <div class="footer-group">
            <div class="footer-left">
                <div class="page-dot">..</div>
                <button class="nav-btn" id="homeBtn"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></button>
            </div>
            <a href="#" class="nav-btn" id="linkBtn" target="_blank"><svg viewBox="0 0 24 24"><path d="M6 6v2h8.59L4.59 18.59 6 20 16 10.41V19h2V6z"/></svg></a>
        </div>
    </div>
</div>

<script>
    const foldingData = [
        { name: "장미", engName: "rose", ratio: 1.0, time: "5 min", level: "lev. 3", point: "비정량적인 종이의 탄성을 이용하여 볼륨을 만듭니다. 평면이 입체가 되는 찰나의 몰입을 느껴보세요." },
        { name: "종이학", engName: "paper crane", ratio: 1/1.14, time: "2 min", level: "lev. 2", point: "영수증의 얇은 틈 사이로 공기가 갇히며 형상이 태어납니다. 반복되는 접힘은 시간의 퇴적을 의미합니다." },
        { name: "작은별", engName: "chopstick rest", ratio: 1/6.3, time: "1 min", level: "lev. 1", point: "작은 종이 띠가 스스로를 지탱하는 입체가 됩니다. 평면 위에 만들어진 이 작은 틈은 당신의 휴식을 위한 자리입니다." }
    ];

    const normalizedData = foldingData.map(d => ({ ...d, norm: d.ratio >= 1 ? d.ratio : 1/d.ratio }));
    const slider = document.getElementById('toleranceSlider');
    const tolText = document.getElementById('tolValue');
    let isDragging = false, startX, startY, currentBox;

    slider.oninput = (e) => { tolText.textContent = Math.round((parseFloat(e.target.value) - 1) * 100) + "%"; };

    document.addEventListener('mousedown', (e) => {
        if (e.target.closest('.control-panel') || e.target.closest('.nav-btn')) return;
        const item = e.target.closest('.matched-item');
        if (item) {
            const data = normalizedData.find(d => d.engName === item.getAttribute('data-name'));
            if(data) openModal(data);
            return;
        }
        document.querySelectorAll('.drag-box').forEach(b => b.remove());
        isDragging = true;
        startX = e.clientX; startY = e.clientY;
        currentBox = document.createElement('div');
        currentBox.className = 'drag-box';
        currentBox.innerHTML = `<div class="suggestion-content"></div><div class="dimension-label">1:1.00</div>`;
        document.body.appendChild(currentBox);
    });

    document.addEventListener('mousemove', (e) => {
        document.getElementById('coordTracker').textContent = `${e.clientX} : ${e.clientY}`;
        if (!isDragging) return;
        const x = Math.min(e.clientX, startX), y = Math.min(e.clientY, startY);
        const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
        currentBox.style.left = x + 'px'; currentBox.style.top = y + 'px';
        currentBox.style.width = w + 'px'; currentBox.style.height = h + 'px';
        const uRatio = Math.max(w, h) / (Math.min(w, h) || 1);
        currentBox.querySelector('.dimension-label').textContent = `1:${uRatio.toFixed(2)}`;
    });

    document.addEventListener('mouseup', () => {
        if (!isDragging) return;
        isDragging = false;
        const w = parseInt(currentBox.style.width), h = parseInt(currentBox.style.height);
        if (w > 20 && h > 20) {
            const uRatio = Math.max(w, h) / Math.min(w, h);
            const tol = parseFloat(slider.value);
            let matched = normalizedData.filter(d => Math.max(uRatio/d.norm, d.norm/uRatio) <= tol);
            if (matched.length > 0) {
                currentBox.querySelector('.suggestion-content').innerHTML = matched.map(item => 
                    `<div class="matched-item" data-name="${item.engName}"><span class="matched-label">${item.engName}</span></div>`).join('');
                currentBox.classList.add('show-result');
                currentBox.style.pointerEvents = 'auto';
            } else { currentBox.remove(); }
        } else { currentBox.remove(); }
    });

    function openModal(data) {
        const modal = document.getElementById('detailModal');
        const visual = document.getElementById('timeVisual');
        
        document.getElementById('modalTitle').textContent = data.engName;
        document.getElementById('modalTime').textContent = data.time;
        document.getElementById('modalLevel').textContent = data.level;
        document.getElementById('modalPoint').textContent = data.point;

        // 초기화: 애니메이션 속성 제거 후 원래 크기로
        visual.style.transition = 'none';
        visual.style.transform = 'scaleX(1) scaleY(1)';
        visual.style.opacity = '1';

        modal.classList.add('active');

        // 브라우저가 초기 상태를 렌더링한 후 애니메이션 시작
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                const duration = (parseInt(data.time) || 1) * 60000;
                visual.style.transition = `transform ${duration}ms linear, opacity ${duration}ms linear`;
                visual.style.transform = 'scaleX(0) scaleY(0.05)'; 
                visual.style.opacity = '0';
            });
        });
    }

    document.getElementById('homeBtn').onclick = () => {
        document.getElementById('detailModal').classList.remove('active');
    };
</script>
</body>
</html>
