<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Origami Ratio Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ececec;
    font-family:Arial, Helvetica, sans-serif;
    overflow:hidden;
}

/* 메인 작업 공간 */
#stage{
    position:relative;
    width:100vw;
    height:100vh;
    cursor:crosshair;
}

/* 현재 드래그 박스 */
#dragBox{
    position:absolute;
    border:1px solid rgba(0,0,0,.45);
    background:rgba(255,255,255,.06);
    display:none;
    pointer-events:none;
}

/* 비율 태그 */
#ratioTag{
    position:absolute;
    top:-24px;
    left:0;
    background:#111;
    color:#fff;
    font-size:11px;
    padding:3px 7px;
    white-space:nowrap;
}

/* 남는 박스 흔적 */
.traceBox{
    position:absolute;
    border:1px solid rgba(0,0,0,.28);
    overflow:hidden;
}

/* 내부 이미지 */
.traceBox img{
    position:absolute;
    max-width:70px;
    max-height:70px;
    object-fit:contain;
    pointer-events:none;
}

/* 우측 상단 좌표 */
#coords{
    position:fixed;
    top:18px;
    right:18px;
    background:#fff;
    padding:8px 10px;
    font-size:12px;
    border:1px solid rgba(0,0,0,.1);
}

/* 하단 좌측 패널 */
#panel{
    position:fixed;
    left:18px;
    bottom:18px;
    width:260px;
    background:#fff;
    padding:14px;
    border:1px solid rgba(0,0,0,.1);
}

#panel h1{
    font-size:14px;
    margin-bottom:12px;
}

#panel label{
    font-size:12px;
}

#tol{
    width:100%;
    margin-top:8px;
}

#small{
    margin-top:10px;
    font-size:11px;
    color:#666;
    line-height:1.5;
}
</style>
</head>
<body>

<div id="stage">

    <div id="dragBox">
        <div id="ratioTag">1 : 1.00</div>
    </div>

</div>

<div id="coords">X:0 Y:0</div>

<div id="panel">
    <h1>Origami Ratio Search</h1>

    <label>
        Tolerance :
        <span id="tolText">20%</span>
    </label>

    <input type="range" min="0" max="100" value="20" id="tol">

    <div id="small">
        Drag empty space to search.<br>
        Spacebar = clear boxes
    </div>
</div>

<script>
/* ===============================
   구글시트 JSON 주소
================================ */
const SHEET_URL =
"https://opensheet.elk.sh/1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60/Sheet1";

/* ===============================
   이미지 폴더 경로
   (현재 html과 assets 폴더가 같은 위치)
================================ */
const ASSET_PATH = "assets/";

/* ===============================
   상태값
================================ */
let db = [];
let isDown = false;
let startX = 0;
let startY = 0;

/* ===============================
   요소
================================ */
const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");
const ratioTag = document.getElementById("ratioTag");
const coords = document.getElementById("coords");
const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");

/* ===============================
   시트 불러오기
================================ */
fetch(SHEET_URL)
.then(r => r.json())
.then(data => {
    db = data;
    console.log("sheet loaded:", db);
})
.catch(err => {
    console.error("sheet error:", err);
});

/* ===============================
   tolerance 표시
================================ */
tol.addEventListener("input",()=>{
    tolText.innerText = tol.value + "%";
});

/* ===============================
   마우스 다운
================================ */
stage.addEventListener("mousedown",(e)=>{

    isDown = true;
    startX = e.clientX;
    startY = e.clientY;

    dragBox.style.display = "block";
    dragBox.style.left = startX + "px";
    dragBox.style.top = startY + "px";
    dragBox.style.width = "0px";
    dragBox.style.height = "0px";
});

/* ===============================
   마우스 이동
================================ */
stage.addEventListener("mousemove",(e)=>{

    coords.innerHTML = `X:${e.clientX} Y:${e.clientY}`;

    if(!isDown) return;

    const x = Math.min(startX,e.clientX);
    const y = Math.min(startY,e.clientY);
    const w = Math.abs(e.clientX-startX);
    const h = Math.abs(e.clientY-startY);

    dragBox.style.left = x + "px";
    dragBox.style.top = y + "px";
    dragBox.style.width = w + "px";
    dragBox.style.height = h + "px";

    if(h > 2){
        const ratio = (w/h).toFixed(2);
        ratioTag.innerHTML = `1 : ${ratio}`;
    }
});

/* ===============================
   마우스 업
================================ */
stage.addEventListener("mouseup",(e)=>{

    if(!isDown) return;
    isDown = false;

    dragBox.style.display = "none";

    const x = Math.min(startX,e.clientX);
    const y = Math.min(startY,e.clientY);
    const w = Math.abs(e.clientX-startX);
    const h = Math.abs(e.clientY-startY);

    if(w < 10 || h < 10) return;

    const ratio = w/h;

    createResultBox(x,y,w,h,ratio);
});

/* ===============================
   결과 박스 생성
================================ */
function createResultBox(x,y,w,h,userRatio){

    const box = document.createElement("div");
    box.className = "traceBox";

    box.style.left = x + "px";
    box.style.top = y + "px";
    box.style.width = w + "px";
    box.style.height = h + "px";

    stage.appendChild(box);

    /* 검색 */
    const tolerance = Number(tol.value)/100;

    let result = db.filter(item=>{

        const r = parseFloat(item.ratio);

        if(isNaN(r)) return false;

        const diff = Math.abs(r-userRatio);

        return diff <= userRatio * tolerance;
    });

    result.sort((a,b)=>{
        return Math.abs(a.ratio-userRatio) - Math.abs(b.ratio-userRatio);
    });

    /* 최대 5개 이미지 넣기 */
    result.slice(0,5).forEach(item=>{

        const img = document.createElement("img");

        /* 시트 image 컬럼 값이 girl.png 면 자동으로 assets/girl.png */
        img.src = ASSET_PATH + item.image;

        img.onerror = ()=>{
            console.log("image fail:", img.src);
        };

        const size = 35 + Math.random()*40;

        img.style.width = size + "px";

        img.style.left = Math.random() * Math.max(10,w-size-10) + "px";
        img.style.top = Math.random() * Math.max(10,h-size-10) + "px";

        img.style.transform =
            `rotate(${Math.random()*40-20}deg)`;

        box.appendChild(img);
    });

    fadeBoxes();
}

/* ===============================
   오래된 박스 흐리게
================================ */
function fadeBoxes(){

    const boxes = document.querySelectorAll(".traceBox");

    boxes.forEach((box,i)=>{

        const total = boxes.length;
        const opacity = Math.max(.15,(i+1)/total);

        box.style.opacity = opacity;
    });

    if(boxes.length > 18){
        boxes[0].remove();
    }
}

/* ===============================
   스페이스바 = 초기화
================================ */
window.addEventListener("keydown",(e)=>{

    if(e.code === "Space"){

        document.querySelectorAll(".traceBox")
        .forEach(el=>el.remove());
    }
});
</script>

</body>
</html>
