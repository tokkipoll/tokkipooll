<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>Origami Specimen Archive</title>
<style>
    /* --- 기초 디자인: 미니멀 & 수직/수평 --- */
    * { margin:0; padding:0; box-sizing:border-box; border-radius: 0 !important; }
    
    body { 
        background: #f0f0f0; 
        font-family: 'Courier New', Courier, monospace; 
        overflow: hidden; 
        color: #000;
    }

    #stage { position:relative; width:100vw; height:100vh; cursor:crosshair; }

    /* 드래그 박스: 얇은 가이드라인 */
    #dragBox { 
        position:absolute; 
        border:1px solid #00ff00; 
        background: rgba(0, 255, 0, 0.05);
        display:none; pointer-events:none; z-index:1000; 
    }
    #ratioTag { 
        position:absolute; top:-22px; left:0; 
        background:#00ff00; color:#000; 
        font-size:10px; font-weight:bold; padding:2px 6px; 
    }

    /* 결과 박스: 표본 전시 케이스 (Specimen Box) */
    .traceBox { 
        position:absolute; 
        border:1px solid #000; 
        background: #fff;
        z-index: 50;
        overflow: hidden;
        display: flex;
        flex-direction: column;
    }

    /* 상자 모서리 L자 크롭 마크 (키치 포인트) */
    .traceBox::before {
        content: ""; position: absolute; top: 10px; left: 10px; width: 20px; height: 20px;
        border-top: 2px solid #00ff00; border-left: 2px solid #00ff00; z-index: 10;
    }

    /* 이미지: 상자 비율에 맞춰 꽉 채우기 (핵심) */
    .result-container {
        flex: 1; width: 100%; height: 100%;
        overflow: hidden; position: relative;
        cursor: pointer;
    }
    .result-img {
        width: 100%; height: 100%;
        object-fit: cover; /* 비율에 맞춰 꽉 채움 */
        filter: grayscale(0.3); transition: filter 0.3s;
    }
    .result-container:hover .result-img { filter: grayscale(0); }

    /* 하단 라벨: 바코드 및 데이터 (키치 & 미니멀) */
    .result-label {
        height: 40px; border-top: 1px solid #000;
        background: #fff; display: flex; align-items: center;
        padding: 0 10px; font-size: 9px; justify-content: space-between;
    }
    .barcode { font-size: 14px; font-family: 'Libre Barcode 39', cursive, sans-serif; }

    /* 상세 화면 (모달) */
    #detailView {
        position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
        background: #fff; display: none; z-index: 2000;
        flex-direction: column; align-items: center; justify-content: center;
        padding: 60px; cursor: s-resize;
    }
    #detailPointBox {
        border-top: 1px solid #000; border-bottom: 1px solid #000;
        padding: 60px 20px; width: 100%; max-width: 600px;
        text-align: center; font-size: 16px; line-height: 2; margin: 40px 0;
    }
    #detailName { font-size: 32px; letter-spacing: 12px; font-weight: normal; }
    #detailMeta { font-size: 10px; letter-spacing: 2px; color: #888; }

    /* 조작 패널 */
    #panel { 
        position:fixed; left:30px; bottom:30px; width:220px; 
        background:#fff; padding:25px; border:1px solid #000; z-index:2000; 
    }
    #panel h1 { font-size:12px; margin-bottom:15px; letter-spacing: 2px; border-bottom: 1px solid #000; padding-bottom: 5px; }
    #status { font-size:9px; margin-bottom:15px; color: #aaa; }
    #tol { width:100%; margin:10px 0; -webkit-appearance:none; background:#000; height:1px; }
    #tol::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; background:#00ff00; border:1px solid #000; cursor:pointer; }
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox"><div id="ratioTag">0.00</div></div>
</div>

<div id="detailView">
    <div id="detailName">NAME</div>
    <div id="detailPointBox">POINT TEXT</div>
    <div id="detailMeta">TIME / LEVEL</div>
</div>

<div id="panel">
    <h1>SPECIMEN_ARCHIVE.sys</h1>
    <div id="status">Scanning...</div>
    <input type="range" min="1" max="100" value="50" id="tol">
</div>

<script>
const SHEET_ID = "1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60";
const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`;
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX, startY;

async function init() {
    try {
        const response = await fetch(CSV_URL);
        const csvText = await response.text();
        const rows = csvText.split('\n').map(row => row.split(','));
        const headers = rows[0].map(h => h.trim().toLowerCase());
        
        const idx = {
            name: headers.findIndex(h => h.includes('name')),
            image: headers.findIndex(h => h.includes('image')),
            ratio: headers.findIndex(h => h.includes('ratio')),
            point: headers.findIndex(h => h.includes('point')),
            level: headers.findIndex(h => h.includes('level')),
            time: headers.findIndex(h => h.includes('time'))
        };

        db = rows.slice(1).map(row => {
            let rRaw = row[idx.ratio];
            let rVal = parseFloat(rRaw);
            if (rRaw && rRaw.includes(':')) {
                const p = rRaw.split(':');
                rVal = parseFloat(p[p.length-1]) / parseFloat(p[0]);
            }
            return {
                name: row[idx.name] || "Unknown",
                image: row[idx.image] ? row[idx.image].trim() : "",
                point: row[idx.point] || "",
                level: row[idx.level] || "",
                time: row[idx.time] || "",
                normRatio: (rVal > 0 && rVal < 1) ? 1/rVal : rVal
            };
        }).filter(item => item.image !== "");
        document.getElementById("status").innerHTML = `Objects: ${db.length}`;
    } catch (e) { document.getElementById("status").innerHTML = `Offline`; }
}
init();

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");

stage.addEventListener("mousedown", (e) => {
    isDown = true; startX = e.clientX; startY = e.clientY;
    dragBox.style.display = "block";
});

stage.addEventListener("mousemove", (e) => {
    if(!isDown) return;
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    dragBox.style.width = w + "px"; dragBox.style.height = h + "px";
    dragBox.style.left = Math.min(e.clientX, startX) + "px"; dragBox.style.top = Math.min(e.clientY, startY) + "px";
    const currentR = w > h ? (w/h) : (h/w);
    document.getElementById("ratioTag").innerHTML = `Target Ratio 1:${currentR.toFixed(2)}`;
});

stage.addEventListener("mouseup", (e) => {
    if(!isDown) return; isDown = false; dragBox.style.display = "none";
    const w = Math.abs(e.clientX - startX), h = Math.abs(e.clientY - startY);
    if(w < 30 || h < 30) return;
    createResultBox(Math.min(e.clientX, startX), Math.min(e.clientY, startY), w, h, w > h ? (w/h) : (h/w));
});

function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    Object.assign(box.style, { left: x+'px', top: y+'px', width: w+'px', height: h+'px' });
    stage.appendChild(box);

    const tolerance = Number(document.getElementById("tol").value) / 100;
    const results = db.filter(item => Math.abs(item.normRatio - userRatio) <= (userRatio * tolerance));

    if (results.length > 0) {
        const item = results[0]; // 가장 유사한 표본 하나를 박스에 꽉 채움
        box.innerHTML = `
            <div class="result-container" onclick="showDetail('${btoa(encodeURIComponent(JSON.stringify(item)))}')">
                <img src="${ASSET_PATH + item.image}" class="result-img">
            </div>
            <div class="result-label">
                <span>OBJ_ID: ${item.name.substring(0,3).toUpperCase()}</span>
                <span>R: 1:${item.normRatio.toFixed(1)}</span>
                <span class="barcode">||| || | |||</span>
            </div>
        `;
    } else {
        box.innerHTML = `<div style="flex:1; display:flex; align-items:center; justify-content:center; font-size:10px; color:#ccc;">NON_MATCH</div>`;
    }
    
    const all = document.querySelectorAll(".traceBox");
    if(all.length > 5) all[0].remove();
}

function showDetail(encoded) {
    const item = JSON.parse(decodeURIComponent(atob(encoded)));
    const view = document.getElementById("detailView");
    document.getElementById("detailName").innerText = item.name;
    document.getElementById("detailPointBox").innerText = item.point;
    document.getElementById("detailMeta").innerText = `${item.time} / LV.${item.level}`;
    view.style.display = "flex";
}

document.getElementById("detailView").onclick = function() { this.style.display = "none"; };
window.addEventListener("keydown", (e) => {
    if(e.code === "Space") document.querySelectorAll(".traceBox").forEach(el => el.remove());
});
</script>
</body>
</html>
