<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Origami Ratio Search</title>

<style>
/* --- 기초 스타일 (직각 디자인) --- */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    /* 모든 요소의 둥근 모서리 제거 */
    border-radius: 0 !important; 
}

body{
    background:#ececec;
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* 메인 작업 공간 */
#stage{
    position:relative;
    width:100vw;
    height:100vh;
    cursor:crosshair;
}

/* 현재 드래그 박스 */
#dragBox{
    position:absolute;
    border:2px solid #000; /* 더 진한 직각 테두리 */
    background:rgba(0,0,0,0.03);
    display:none;
    pointer-events:none;
    z-index: 100;
}

/* 비율 태그 (직각 디자인) */
#ratioTag{
    position:absolute;
    top:-26px;
    left:0;
    background:#000;
    color:#fff;
    font-size:12px;
    font-weight: bold;
    padding:4px 8px;
    white-space:nowrap;
}

/* 결과 박스 흔적 */
.traceBox{
    position:absolute;
    border:1px solid rgba(0,0,0,0.2);
    background: rgba(255,255,255,0.3);
    overflow:hidden;
    transition: opacity 0.5s;
}

/* 내부 이미지 */
.traceBox img{
    position:absolute;
    max-width:80px;
    max-height:80px;
    object-fit:contain;
    pointer-events:none;
    /* 그림자 효과도 직각 느낌에 맞춰 최소화 */
    filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.1));
}

/* 우측 상단 좌표 (직각 디자인) */
#coords{
    position:fixed;
    top:0; /* 화면 끝에 붙임 */
    right:0;
    background:rgba(255,255,255,0.9);
    padding:8px 12px;
    font-size:12px;
    border-left:1px solid rgba(0,0,0,0.1);
    border-bottom:1px solid rgba(0,0,0,0.1);
    z-index: 200;
}

/* 하단 좌측 패널 (직각 디자인) */
#panel{
    position:fixed;
    left:18px;
    bottom:18px;
    width:260px;
    background:#fff; /* 완전 불투명 하얀색 */
    padding:20px;
    border:2px solid #000; /* 진한 직각 테두리 */
    box-shadow: 5px 5px 0px rgba(0,0,0,0.1); /* 직각 그림자 */
    z-index: 200;
}

#panel h1{
    font-size:16px;
    margin-bottom:12px;
    border-bottom: 2px solid #000;
    padding-bottom: 8px;
}

#panel label{
    font-size:13px;
    font-weight: bold;
}

#tolText {
    color: #000; /* 색상 통일 */
}

#tol{
    width:100%;
    margin: 12px 0;
    cursor: pointer;
    /* 슬라이더 스타일도 직각으로 (브라우저마다 다를 수 있음) */
    -webkit-appearance: none;
    background: #ccc;
    height: 8px;
}

#tol::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #000;
    cursor: pointer;
}

#small{
    font-size:11px;
    color:#333;
    line-height:1.6;
    border-top: 1px solid #eee;
    padding-top: 10px;
    margin-top: 10px;
}
</style>
</head>
<body>

<div id="stage">
    <div id="dragBox">
        <div id="ratioTag">1 : 1.00</div>
    </div>
</div>

<div id="coords">X:0 Y:0</div>

<div id="panel">
    <h1>Origami Ratio Search</h1>

    <label>
        Tolerance: <span id="tolText">20%</span>
    </label>
    <input type="range" min="1" max="100" value="20" id="tol">

    <div id="small">
        • <b>Drag</b> to search origami ratios<br>
        • <b>Spacebar</b> to clear all boxes<br>
        • <b>Adjust Tolerance</b> if no results appear
    </div>
</div>

<script>
/* ===============================
   데이터 및 경로 설정 (수정됨)
================================ */
const SHEET_URL = "https://opensheet.elk.sh/1mUHp4mcSNIt5rGfNJSCVcvubCNxyarSay7xfvvuoa60/Sheet1";

// 폴더 구조 스크린샷에 맞춰 경로 수정: tokkipooll/index.html 기준
const ASSET_PATH = "foldingpapers/assets/"; 

let db = [];
let isDown = false;
let startX = 0;
let startY = 0;

const stage = document.getElementById("stage");
const dragBox = document.getElementById("dragBox");
const ratioTag = document.getElementById("ratioTag");
const coords = document.getElementById("coords");
const tol = document.getElementById("tol");
const tolText = document.getElementById("tolText");

/* ===============================
   데이터 불러오기 및 전처리 (동일)
================================ */
fetch(SHEET_URL)
.then(r => r.json())
.then(data => {
    db = data.map(item => {
        let rVal = item.ratio;
        if (typeof rVal === 'string' && rVal.includes(':')) {
            const p = rVal.split(':');
            rVal = parseFloat(p[0]) / parseFloat(p[1]);
        } else {
            rVal = parseFloat(rVal);
        }
        return { ...item, parsedRatio: rVal };
    });
    console.log("시트 로드 완료. 이미지 경로:", ASSET_PATH, db);
})
.catch(err => console.error("시트 에러:", err));

/* ===============================
   이벤트 리스너 (동일)
================================ */
tol.addEventListener("input", () => {
    tolText.innerText = tol.value + "%";
});

stage.addEventListener("mousedown", (e) => {
    isDown = true;
    startX = e.clientX;
    startY = e.clientY;

    dragBox.style.display = "block";
    dragBox.style.left = startX + "px";
    dragBox.style.top = startY + "px";
    dragBox.style.width = "0px";
    dragBox.style.height = "0px";
});

stage.addEventListener("mousemove", (e) => {
    coords.innerHTML = `X:${e.clientX} Y:${e.clientY}`;
    if(!isDown) return;

    const x = Math.min(startX, e.clientX);
    const y = Math.min(startY, e.clientY);
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);

    dragBox.style.left = x + "px";
    dragBox.style.top = y + "px";
    dragBox.style.width = w + "px";
    dragBox.style.height = h + "px";

    if(h > 5){
        const ratio = (w/h).toFixed(2);
        ratioTag.innerHTML = `Ratio 1 : ${ratio}`;
    }
});

stage.addEventListener("mouseup", (e) => {
    if(!isDown) return;
    isDown = false;
    dragBox.style.display = "none";

    const x = Math.min(startX, e.clientX);
    const y = Math.min(startY, e.clientY);
    const w = Math.abs(e.clientX - startX);
    const h = Math.abs(e.clientY - startY);

    if(w < 20 || h < 20) return;

    createResultBox(x, y, w, h, w/h);
});

/* ===============================
   메인 로직: 결과 생성 (동일)
================================ */
function createResultBox(x, y, w, h, userRatio) {
    const box = document.createElement("div");
    box.className = "traceBox";
    box.style.left = x + "px";
    box.style.top = y + "px";
    box.style.width = w + "px";
    box.style.height = h + "px";
    stage.appendChild(box);

    const toleranceVal = Number(tol.value) / 100;

    let results = db.filter(item => {
        if (isNaN(item.parsedRatio)) return false;
        const diff = Math.abs(item.parsedRatio - userRatio);
        return diff <= (userRatio * toleranceVal);
    });

    results.sort((a, b) => {
        return Math.abs(a.parsedRatio - userRatio) - Math.abs(b.parsedRatio - userRatio);
    });

    results.slice(0, 5).forEach(item => {
        if (!item.image) return;

        const img = document.createElement("img");
        img.src = ASSET_PATH + item.image.trim();

        img.onload = () => {
            const size = Math.min(w, h, 40 + Math.random() * 40);
            img.style.width = size + "px";
            img.style.left = Math.random() * Math.max(0, w - size) + "px";
            img.style.top = Math.random() * Math.max(0, h - size) + "px";
            img.style.transform = `rotate(${Math.random() * 20 - 10}deg)`; // 회전각도 줄임
            box.appendChild(img);
        };

        img.onerror = () => console.log("이미지 로드 실패. 경로 확인:", img.src);
    });

    fadeBoxes();
}

function fadeBoxes() {
    const boxes = document.querySelectorAll(".traceBox");
    boxes.forEach((box, i) => {
        const opacity = Math.max(0.1, (i + 1) / boxes.length);
        box.style.opacity = opacity;
    });
    if(boxes.length > 15) boxes[0].remove();
}

window.addEventListener("keydown", (e) => {
    if(e.code === "Space") {
        document.querySelectorAll(".traceBox").forEach(el => el.remove());
    }
});
</script>

</body>
</html>
